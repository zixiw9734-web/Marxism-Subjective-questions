0,0,.16);transition:.22s} body.mem .switch{background:#d70935} body.mem .switch:before{transform:translateX(20px)} .tabs{display:flex;gap:12px;margin-top:16px} .tabs button{border:0;border-radius:24px;padding:12px 22px;background:rgba(255,255,255,.62);backdrop-filter:blur(18px) saturate(1.45);font-weight:900;color:#667386;cursor:pointer} .tabs button.active{background:#d70935;color:white;box-shadow:0 14px 28px rgba(215,9,53,.2)} .content{padding:30px 34px 70px;max-width:1220px} .section-title{font-size:24px;font-weight:950;margin:6px 0 22px;border-left:6px solid #d70935;padding-left:14px} .card{border:1px solid rgba(255,255,255,.55);background:linear-gradient(135deg,rgba(255,255,255,.74),rgba(255,255,255,.44));backdrop-filter:blur(24px) saturate(1.55);border-radius:8px;margin:0 0 22px;padding:22px;box-shadow:0 18px 44px rgba(31,41,55,.08),inset 0 1px 0 rgba(255,255,255,.8)} .q{font-size:20px;font-weight:950;line-height:1.45;margin-bottom:16px} .num{color:#c80a30;background:rgba(215,9,53,.1);padding:2px 6px;border-radius:4px;margin-right:6px} .ans{background:rgba(248,250,252,.7);border:1px solid rgba(130,140,156,.12);border-radius:8px;padding:16px 18px;font-size:17px;line-height:1.9;color:#3e4a5c;white-space:pre-wrap} .kw{position:relative;display:inline-flex;align-items:center;justify-content:center;vertical-align:baseline;margin:0 2px;padding:1px 5px;border:0;border-radius:6px;background:rgba(255,235,117,.72);color:#141a24;font:inherit;font-weight:900;line-height:1.45;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.7);transition:background .18s,box-shadow .18s,transform .18s}.kw:focus-visible{outline:2px solid #d70935;outline-offset:2px}.kw span{pointer-events:none}body.mem .kw{min-width:2.6em;min-height:1.55em;color:transparent;background:rgba(255,255,255,.36);border:1px solid rgba(255,255,255,.72);backdrop-filter:blur(12px) saturate(1.8);box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 7px 18px rgba(31,41,55,.12)}body.mem .kw span{opacity:0;filter:blur(8px)}body.mem .kw:after{content:"";position:absolute;inset:5px 9px;border-radius:999px;background:linear-gradient(90deg,rgba(80,90,105,.22),rgba(80,90,105,.08),rgba(80,90,105,.22))}body.mem .kw.open{color:#141a24;background:#fff08a;border-color:rgba(245,190,40,.45);transform:translateY(-1px)}body.mem .kw.open span{opacity:1;filter:none}body.mem .kw.open:after{display:none} @media(max-width:760px){.app{grid-template-columns:1fr}.side{height:38vh;border-right:0;border-bottom:1px solid rgba(130,140,156,.22)}.main{height:62vh}.top{padding:18px}.content{padding:22px 18px 54px}}

<div class="app"><aside class="side"><div class="brand"><div class="mark">★</div><div><h1>马克思主义<br>基本原理</h1></div></div><div class="nav" id="nav"></div></aside><main class="main"><div class="top"><div class="title" id="ct"></div><div class="bar">背诵模式 <button class="switch" id="mem"></button></div><div class="tabs"><button data-section="全部" class="active">全部</button><button data-section="提纲">提纲</button><button data-section="思考题">思考题</button></div></div><div class="content" id="content"></div></main></div>
<script>
const DATA={"chapters": ["导论", "第一章", "第二章", "第三章", "第四章", "第五章", "第六章", "第七章"], "items": [{"no": 1, "chapter": "导论", "section": "提纲", "question": "什么是马克思主义基本原理？p.3-4", "answer": "1.是对马克思主义立场观点方法的集中概括\n2.（是马克思主义在其形成、发展和运用过程中经过实践反复检验而确立起来的具有普遍真理性的理论）\n3.体现马克思主义的根本性质和整体特征\n4.体现马克思主义科学性和革命性的统一\n5.具有普遍的、根本的和长远的指导意义", "keywords": ["立场观点方法", "普遍真理性", "根本性质", "整体特征", "科学性和革命性的统一", "指导意义"]}, {"no": 2, "chapter": "导论", "section": "提纲", "question": "马克思主义理论直接的理论来源有哪些？p.5", "answer": "1.德国古典哲学、英国古典政治经济学、英法空想社会主义为马克思主义的创立提供了直接的理论来\n源。\n2.（这些都是资本主义发展初期的思想家求索时代课题的尝试， 包含许多具有启发性的思想， 比如德国\n古典哲学的辩证法思想， 英国古典政治经济学对资本主义生产关系的分析和关于劳动创造价值的思想， 英法\n空想社会主义对资本主义社会的批判和对未来新社会的展望等。）\n3.（19 世纪的三大科学发现，即细胞学说、能量守恒与转化定律、生物进化论，为马克思主义的产\n生提供了自然科学前提。）\n4.（从更广泛的意义上讲，马克思主义的思想来源不只这些，还有古希腊罗马哲学、文艺复兴运动的\n思想成果、法国复辟时期历史学家的进步思想等。）", "keywords": ["德国古典哲学", "英国古典政治经济学", "英法空想社会主义", "生产关系", "细胞学说", "能量守恒与转化定律", "生物进化论"]}, {"no": 3, "chapter": "导论", "section": "提纲", "question": "马克思主义的基本特征是什么？ p.13-16", "answer": "马克思主义具有鲜明的科学性、人民性、实践性、发展性，这些特征体现了马克思主义的本质和使\n命，也展现出马克思主义的理论形象。\n1.马克思主义是对自然、社会和人类思维发展本质和规律的正确反映。\n2.人民性是马克思主义的本质属性，人民至上是马克思主义的政治立场。\n3.马克思主义是从实践中来、到实践中去、在实践中接受检验，并随实践而不断发展的学说。\n4.马克思主义是不断发展的开放的学说，具有与时俱进的理论品质。\n马克思主义的基本特征，如果用一句话来概括就是科学性与革命性的统一。", "keywords": ["科学性", "人民性", "实践性", "发展性", "本质", "正确反映", "人民至上", "与时俱进"]}, {"no": 4, "chapter": "第一章", "section": "提纲", "question": "哲学的基本问题是什么？p.26-27", "answer": "1.一是存在和思维、 物质和意识谁为本原的问题，即何者为第一性的问题；对这一问题的不同回答，\n形成了唯物主义和唯心主义两种根本对立的哲学派别。\n粗体是重点，蓝色是新增内容\n2.二是存在和思维、 物质和意识是否具有同一性的问题， 即思维能否正确地反映存在、 人\n能否认识或彻底认识世界的问题；对这一问题的不同回答， 产生了可知论和不可知论的理论分\n野。", "keywords": ["存在和思维", "物质和意识", "第一性", "唯物主义", "唯心主义", "同一性", "不可知论"]}, {"no": 5, "chapter": "第一章", "section": "提纲", "question": "马克思主义的物质范畴理论及其理论意义是什么？p.27-29", "answer": "马克思主义的“物质”范畴是一个高度抽象的哲学概念，是对世界上客观存在的各种事物\n共同本质的概括。\n意义：\n1.坚持了唯物主义一元论，同唯心主义一元论和二元论划清了界限。\n2.坚持了能动的反映论和可知论，批判了不可知论。\n3.体现了唯物论和辩证法的统一，克服了形而上学唯物主义的缺陷。\n4.体现了唯物主义自然观与历史观的统一，为彻底的唯物主义奠定了理论基\n础。", "keywords": ["客观存在", "唯物主义一元论", "唯心主义", "能动的反映论", "不可知论", "唯物论和辩证法", "自然观与历史观"]}, {"no": 6, "chapter": "第一章", "section": "提纲", "question": "意识的起源、本质及能动作用 p.33-35", "answer": "1.意识的起源： 一方面，意识是自然界长期发展的产物。它的形成和发展经历了三个阶段，\n即由一切物质所具有的反应特性到低等生物的刺激感应性，再到高等动物的感觉和心理，最终\n发展为人类的意识。另一方面，意识也是社会历史发展的产物。社会实践，特别是劳动，在意\n识的产生和发展中起着决定性的作用。 劳动为意识的产生和发展提供了客观需要和可能， 在人\n们的劳动和交往中形成的语言促进了意识的发展。\n2.从意识的本质来看，意识是人脑这样一种特殊物质的机能和属性，是客观世界的主观映\n象。意识在内容上是客观的，在形式上是主观的，是客观内容和主观形式的统一。意识是物质\n的产物，但又不是物质本身。\n3.物质决定意识，意识对物质具有反作用 ，这种反作用就是意识的能动作用 。意识的能动作用\n主要表现在：意识具有目的性和计划性 。意识具有创造性。 意识具有指导实践改造客观世界的作用。\n意识具有调控人的行为和生理活动的作用。", "keywords": ["自然界长期发展", "社会历史发展", "人脑", "反作用", "目的"]}, {"no": 7, "chapter": "第一章", "section": "提纲", "question": "主观能动性和客观规律性的辩证统一 p.35-36", "answer": "1.尊重客观规律是正确发挥主观能动性的前提。\n2.只有充分发挥主观能动性，才能正确认识和利用客观规律。\n正确发挥人的主观能动性的前提和条件（怎样，方法）：\n1. 从实际出发是正确发挥人的主观能动性的前提。\n2. 实践是正确发挥人的主观能动性的根本途径。\n3. 正确发挥人的主观能动性，还要依赖于一定的物质条件和物质手段。", "keywords": ["尊重客观规律", "从实际出发", "根本途径", "依赖", "物质条件", "物质手段"]}, {"no": 8, "chapter": "第一章", "section": "提纲", "question": "人工智能能否具有人类意识、能否超越甚至取代人类智能？p.37-38", "answer": "1. 人工智能不具有人类意识。意识是自然界长期发展和社会实践特别是劳动发展的产物，是人脑的机能，是客观世界的主观映象；人工智能本质上是人类意识和实践活动的技术延伸，是对信息进行处理、模拟和生成的工具。\n2. 人工智能可以在特定领域超过人的某些智能表现，如计算、检索、识别、生成和优化，但这种“超过”是局部的、功能性的，不等于具备人的主体意识、价值判断、社会关系和实践能力。\n3. 人类智能具有社会历史性、目的性、创造性和价值性，离不开人的身体、语言、劳动、交往和社会生活；人工智能依赖算法、数据、算力和人类设定的目标，不能脱离人的实践而自我成为历史主体。\n4. 应当坚持辩证态度：既看到人工智能推动生产力发展、促进认识和实践创新的重要作用，又看到其可能带来的伦理、就业、安全和治理问题，坚持以人为本、趋利避害、规范发展。", "keywords": ["不具有人类意识", "技术延伸", "局部的", "功能性的", "社会历史性", "以人为本"]}, {"no": 9, "chapter": "第一章", "section": "提纲", "question": "唯物辩证法的总观点和总特征是什么？p.40-43", "answer": "唯物辩证法认为，世界上的万事万物都处于普遍联系之中，普遍联系引起事物的变化发\n展。联系和发展的观点是唯物辩证法的总观点，集中体现了唯物辩证法的总特征。", "keywords": ["普遍联系", "总观点", "总特征"]}, {"no": 10, "chapter": "第一章", "section": "提纲", "question": "为什么说对立统一规律是唯物辩证法的实质和核心？p.43-44", "answer": "1.对立统一规律\n2.揭示了事物普遍联系的根本内容和变化发展的内在动力，从根本上回答了\n事物为什么会发展的问题；\n3.贯穿量变质变规律、否定之否定规律以及唯物辩证法基本范畴的中心线索\n4.提供了人们认识世界和改造世界的根本方法—  矛盾分析方法", "keywords": ["普遍联系", "变化发展", "内在动力", "量变", "中心线索", "矛盾分析方法"]}, {"no": 11, "chapter": "第一章", "section": "提纲", "question": "矛盾的含义及其基本属性是什么？p.44-45", "answer": "含义：矛盾是反映事物内部或事物之间对立统一关系的哲学范畴。\n属性：对立和统一分别体现了矛盾的两种基本属性。矛盾的对立属性又称斗争性，矛盾的\n统一属性又称同一性。矛盾的同一性是指矛盾着的对立面相互依存、相互贯通的性质和趋势，\n有两个方面的含义：一是矛盾着的对立面相互依存，互为存在的前提，并共处于一个统一体\n中；二是矛盾着的对立面相互贯通，在 一 定条件下可以相互转化。矛盾的斗争性是矛盾着的对\n立面相互排斥、相互分离的性质和趋势。\n同一性和斗争性的辩证关系：1.相互联结，相辅相成。2.同一性是有条件的、相对的。3.\n斗争性是无条件的、绝对的。4.同一性和斗争性相结合构成了事物的矛盾运动，推动事物的变\n化发展", "keywords": ["对立", "斗争性", "同一性", "相互依存", "相互转化"]}, {"no": 12, "chapter": "第一章", "section": "提纲", "question": "如何理解矛盾的普遍性与特殊性的关系及其现实意义？p.45-47", "answer": "1.矛盾的普遍性是指矛盾存在于一切事物中，存在于一切事物发展过程的始终，旧的矛盾解\n决了，又产生新的矛盾，事物始终在矛盾中运动。\n2.矛盾的特殊性是指各个具体事物的矛盾、每一个矛盾的各个方面在发展的不同阶段上各\n有其特点。\n3.矛盾的普遍性和特殊性是辩证统一的关系。矛盾的普遍性即矛盾的共性，矛盾的特殊\n性即矛盾的个性。矛盾的共性是无条件的、绝对的，矛盾的个性是有条件的、相对的。任何现实\n存在的事物的矛盾都是共性和个性的有机统一，共性寓于个性之中，没有离开个性的共性 ，也\n没有离开共性的个性。矛盾的共性和个性、绝对和相对的道理，是关于事物矛盾问题的精髓，是\n正确理解矛盾学说的关键，不懂得它，就不能真正掌握唯物辩证法。矛盾的共性和个性相统一\n的关系，既是客观事物固有的辩证法，也是科学的认识方法。人的认识的一般规律就是由认\n识个别上升到认识一般,再由认识一般到认识个别的辩证发展过程。\n4.矛盾 的普遍性和特殊 性辩证关系原理是马克思主义基本原理 同各国实际相结合的\n哲学基础。中国共产党坚持把马克思主义基本原理同中国具体实际相结合、同中华优秀传统文\n化相结合，不断推进马克思主义中国化时代化，取得一系列重大理论成果， 指引中国革命、建设、\n改革取得伟大胜利，同时又用中国经验和理论创新丰富发展了马克思主义。", "keywords": ["共性", "个性", "中国具体实际", "马克思主义中国化时代化", "改革", "理论创新"]}, {"no": 13, "chapter": "第一章", "section": "提纲", "question": "如何理解量变、质变及其辩证关系？p.47-48", "answer": "1.量变是事物数量的增减和组成要素排列次序的变动，是保持事物的质的相对稳定性的不\n显著变化，体现了事物发展渐进过程的连续性。\n质变是事物性质的根本变化，是事物由一种质态向另一种质态的飞跃，体现了事物发展渐\n进过程和连续性的中断。\n1.量变和质变的辩证关系是：第一 ，量变是质变的必要准备。任何事物的变化都有一个量变\n的积累过程，没有量变的积累，质变就不会发生。第二，质变是量变的必然结果， 并为新的量\n变开辟道路。单纯的量变不会永远持续下去 ，量变达到一定程度必然引起质变。第三 ，量变和\n质变是相互渗透的。 一方面，在总的量变过程中有阶段性和局部性的部分质变 ；另一方面，在 质变\n过程中也有旧质在量上的收缩和新质在量上的扩张。量变和质变是相互依存、相互贯通的，量\n变引起质变，在新质的基础上，事物又开始新的量变，如此交替循环，构成了事物的发展过\n程。量变质变规律体现了事物发展的渐进性和飞跃性的统一。", "keywords": ["飞跃", "必要准备", "必然结果", "相互渗透", "部分质变", "相互依存"]}, {"no": 14, "chapter": "第一章", "section": "提纲", "question": "怎样理解辩证否定观的基本内容及其现实意义？p.48-50", "answer": "1.基本内容：否定是事物的自我否定 ，是事物内部矛盾运动的结果。否定是事物发展的环\n节，是旧事物转变为新事物。否定是新旧事物联系的环节。辩证否定的实质是“扬弃”\n2.辩证否定观对于人们的认识和实践活动具有重要的指导意义，它要求我们对待一切事物\n都要采取科学分析的态度，既要把握住它的现存状态又要把握住它的发展趋向，反对简单地肯\n定一切或否定一切。 例如， 对于中华优秀传统文化， 我们既要注重传承， 又要根据时代要求实\n现创造性转化和创新性发展。 对于其他民族的文化成果， 我们既不照搬， 也不应一概排斥，而\n要批判地吸收其合理的因素，为我所用。", "keywords": ["自我否定", "内部矛盾", "联系", "扬弃", "科学分析", "中华优秀传统文化"]}, {"no": 15, "chapter": "第一章", "section": "提纲", "question": "如何理解矛盾分析法是根本的认识方法以及坚持问题导向？p.57-58", "answer": "矛盾分析法：\n1.矛盾分析方法是对立统一规律在方法论上的体现， 在唯物辩证法的方法论体系中居于核心\n地位，是我们认识事物的根本方法。\n2.矛盾分析方法的核心要求是善于分析矛盾的特殊性， 做到具体矛盾具体分析， 对具体情况、\n具体问题作具体分析。\n3.运用唯物辩证法的矛盾分析方法研究问题和解决问题，就要求我们不断强化问题意识， 坚\n持具体问题具体分析，善于认识和化解矛盾，尤其 是要把优先解决主要矛盾作为打开局面的突\n破口，以此带动其他矛盾的解决。\n4.习近平强调，改革要“扭住关键”，“突出问题导向”，体现了矛盾分析方法在改革和发展\n问题上的运用。\n坚持问题导向：\n坚持问题导向，是习近平新时代中国特色社会主义思想的重要方法,是辩证唯物主义矛盾\n观点和矛盾分析方法的时代表达和时代升华。 问题是时代的声音，是矛盾的集中体现，发现了\n问题就等于抓住了事物的矛盾。马克思主义的一个鲜明特点，就是自始至终贯穿着强烈的问\n题意识，始终关注和回答时代和实践提出的重大现实问题。坚持问题导向是马克思主义永葆\n生机活力的奥秘所在。坚持问题导向就要努力抓住化解矛盾的着力点，找到解决矛盾的新思\n路新办法。 坚持问题导向，不 仅要增强问题意识，还要善于发现问题、 敢于正视问题；不仅要\n科学分析问题、 深入研究问题 ，还要勇于触及矛盾、长 于 化解矛盾， 尤其是要善于灵活运用辩\n证思维、创新思维等科学思维方法解决各种复杂问题。", "keywords": ["矛盾分析方法", "对立统一规律", "具体矛盾具体分析", "问题意识", "主要矛盾", "扭住关键", "突出问题导向", "中国特色社会主义"]}, {"no": 16, "chapter": "第二章", "section": "提纲", "question": "实践的基本特征、基本结构、及基本形式 p.74-78", "answer": "动性和社会历史性三个基本特征:\n实践是人类能动地改造世界的社会性的物质活动，具有客观实在性、自觉能\n1.实践具有客观实在性。实践是人类改造世界的客观物质活动,它虽然是人类有目的、有\n意识的行为，但本质上是客观的、物质的活动。\n2.实践具有自觉能动性。与动物本能的、被动的适应性活动不同，人的实践\n活动是一种有目的、有意识的活动。\n3.实践具有社会历史性。实践是社会性的、历史性的活动。实践从一开始就是社会性的活\n动。实践又是历史地发展着的实践。\n人的实践活动是以改造客观世界为目的的客观过程，是实践的主体与客体之间的相互作\n用，这种相互作用必须借助于一定的手段和工具，即实践的中介。实践的主体、客体和中介是\n实践活 动的三项基本要素，三 者 的有机 统一 构 成\n实践的基本结构:\n1.实践主体。在实践活动中，实践主体是指具有一定的主体能力、从事现实社会实践活动\n的人，是实践活动中自主性和能动性的因素,担负着设定实践目的、操作实践中介、改造实践\n客体的任务。\n2.实践客体。实践客体是指实践活动所指向的对象。\n3.实践中介。实践中介是指各种形式的工具、手段以及运用、操作这些工具、\n手段的程序和方法。\n实践的形式可分为以下三种基本类型：\n1.物质生产实践。物质生产实践是人类最基本的实践活动，它解决人与自然的矛盾，满足\n人们的物质生活资料和生产劳动资料的需要， 同时生产和再生产社会的基本经济关系，由此决\n定着社会的基本性质和面貌。\n2.社会政治实践。社会政治实践是处理各种政治关系的实践，主要指人们的政治活动。\n3.三是科学文化实践。科学文化实践是创造精神文化产品的实践活动，具有\n各种不同的形式，其中重要的形式有科学、艺术、教育等活动。\n以上三种实践类型既各具不同的社会功能，又密切联系在一起。其中物质生产实践是最\n基本的实践活动，构成全部社会生活的基础；社会政治实践和科学文化实践在物质生产实践\n基础上产生和发展，受物质生产实践的制约并对其产生能动的反作用。", "keywords": ["社会历史性", "客观实在性", "自觉能动性", "实践主体", "物质生产实践", "社会政治实践", "科学文化实践"]}, {"no": 17, "chapter": "第二章", "section": "提纲", "question": "实践对认识的决定作用表现在哪些方面？p.79-80", "answer": "1.实践是认识的来源。认识的内容是在实践活动的基础上产生和发展的。\n2.实践是认识发展的动力。 实践的需要推动认识的产生和发展， 推动人类的科学发现和\n技术发明，推动人类的思想进步和理论创新。\n3.实践是认识的目的 。人们通过实践获得认识，不 是“猎奇”或“雅兴”，不 是为认识而认识，\n其最终目的是为实践服务，指导实践，以满足人们生活和生产的需要。\n4.实践是检验认识真理性的唯一标准。真理不是自封的。“判定认识或理论\n之是否真理，不是依主观上觉得如何而定，而是依客观上社会实践的结果如何而定。", "keywords": ["来源", "理论创新", "目的", "猎奇", "雅兴", "唯一标准"]}, {"no": 18, "chapter": "第二章", "section": "提纲", "question": "感性认识、理性认识及其辩证关系是什么？p.83-87", "answer": "1.感性认识是人们在实践基础上，由感觉器官直接感受到的关于事物的现象、事物的外部\n联系、事物的各个方面的认识。\n2.理性认识是指人们借助抽象思维，在概括整理大量感性材料的基础上，达到关于事物的\n本质、全体、内部联系和事物自身规律性的认识。\n3.理性认识依赖于感性认识。\n4.感性认识有待于发展和深化为理性认识。\n5.感性认识和理性认识相互渗透、相互包含。", "keywords": ["现象", "联系", "本质", "依赖", "深化", "相互渗透", "相互包含"]}, {"no": 19, "chapter": "第二章", "section": "提纲", "question": "真理的定义及真理的客观性和一元性 p.92-93", "answer": "1.真理是标志主观与客观相符合的哲学范畴，是对客观事物及其规律的正确反映。\n2.真理的客观性指真理的内容是对客观事物及其规律的正确反映， 真理中包含着不依赖于人\n和人的意识的客观内容。客观性是真理的本质属性,\n3.真理的客观性决定了真理的一元性。真理的一元性是指在同一条件下对于特定的认识客\n体的真理性认识只有一个，而不可能有多个。\n4.认识是多元的，但真理是一元的。", "keywords": ["主观与客观相符合", "正确反映", "依赖", "本质", "同一条件", "理性认识"]}, {"no": 20, "chapter": "第二章", "section": "提纲", "question": "真理的绝对性和相对性及其辩证关系 p.93-96", "answer": "1.真理的绝对性。 真理的绝对性是指真理主客观统一的确定性和发展的无限性。它有两个方\n面的含义：一是指任何真理都标志着主观与客观相符合，都包含着不依赖于人和人的意识的\n客观内容，都同谬误有原则的界限。这一点是绝对的、无条件的。二是人类认识按其本性来\n说， 能够正确认识无限发展着的物质世界，认识每前进一步， 都是对无限发展着的物质世界的\n接近，这一点也是绝对的、无条件的。\n2.真理的相对性。真理的相对性是指人们在一定条件下对客观事物及其本质和发展规律的\n正确认识总是有限度的、 不完善的。它具有两个方面的含义： 一是从客观世界的整体来看，任何真\n理都只是对客观世界的某一阶段、某一部分的正确认识，人类已经达到的认识的广度总是有\n限度的， 因而，认识有待扩展。二是就特定事物而言，任何真理都只是对客观对象一定方面、一 定\n层次和一定程度的正确认识，认识反映事物的深度是有限度的，或是近似性的， 因而，认识有\n待深化。\n3.真理的绝对性和相对性的辩证统一。从真理的两重性上看，真理的绝对性与相对性相互\n依存，任何真理都既是绝对的，又是相对的。真理的绝对性与相对性又是相互包含的。绝对之\n中有相对，相对之中有绝对， 真理的绝对性通过真理的相对性表现出来，任何真理的相对性之中\n都包含着真理绝对性的颗粒。从真理的发展上看，人类的认识是一个不断深化的过程，永远处\n在由真理的相对性走向绝对性、接近绝对性的转化和发展过程中。任何真理性的认识都是由真\n理的相对性向绝对性转化过程中的一个环节，它既是以往实践和认识业已达到的终点，又是进一\n步迈向真理的绝对性的起点。 真理既具有绝对性，又具有相对性， 这是真理问题上的辩证法。", "keywords": ["确定性", "主观与客观相符合", "依赖", "本质", "两重性", "相互包含", "不断深化"]}, {"no": 21, "chapter": "第二章", "section": "提纲", "question": "为什么说实践是检验真理的唯一标准？p.99-101", "answer": "1. 从真理的本性看，真理是主观同客观相符合的认识。检验一种认识是否真理，不能只看主观感觉、理论推演或权威判断，必须看它能否同客观实际相符合。\n2. 从实践的特点看，实践具有直接现实性，能够把主观认识变成客观结果，使认识同对象发生现实联系。\n3. 实践标准具有确定性和不确定性的统一。确定性在于实践是检验真理的唯一标准；不确定性在于具体实践受历史条件限制，对真理的检验也是一个不断发展的过程。\n4. 坚持实践标准，要求一切从实际出发，在实践中发现真理、检验真理、发展真理。", "keywords": ["主观同客观相符合", "直接现实性", "联系", "不确定性", "从实际出发"]}, {"no": 22, "chapter": "第二章", "section": "提纲", "question": "如何理解守正创新以及理论创新与实践创新之间的关系？p.118-121", "answer": "守正创新深刻揭示了坚持真理与发展真理、坚持马克思主义与发展\n马克思主义的辩证关系，为推进党和人民事业提供了科学的立场观点方法。\n1.人类的创新活动具有丰富的内容和表现， 包含着知识创新、 制度创新、 科技创新、 文化\n创新等各方面创 新 。归结起来讲， 主要是理论创新和实践创新两个基本方面，它们集中体现了\n人类在认识世界和改造世界中的创新活动。\n2.守正创新彰显着党的理论创新和实践创新的时代要求。\n3.实践创新为理论创新提供不竭的动力源泉。\n4.理论创新为实践创新提供科学的行动指南。\n5.理论创新和实践创新不是孤立进行的， 而是在与另一方的互动中完成的，二者相互促进、\n辩证统一， 不断实现更高阶段的创新发展。离开了实践的创新， 理论创新就会缺乏动力； 离开\n了理论的创新，实践创新就会迷失方向。", "keywords": ["守正创新", "理论创新", "实践创新", "动力源泉", "行动指南", "相互促进"]}, {"no": 23, "chapter": "第三章", "section": "提纲", "question": "社会历史观的基本问题是什么？p.124", "answer": "1. 社会历史观的基本问题是社会存在和社会意识的关系问题。\n2. 社会存在决定社会意识，社会意识是社会存在的反映；社会意识又具有相对独立性，并能反作用于社会存在。\n3. 对这一问题的不同回答，是划分历史唯物主义和历史唯心主义的根本标准。", "keywords": ["关系问题", "社会存在决定社会意识", "相对独立性", "历史唯物主义", "历史唯心主义"]}, {"no": 24, "chapter": "第三章", "section": "提纲", "question": "社会存在包含哪些要素，这些要素在社会发展中各起什么作用？p.125-127", "answer": "在是指社会物质生活条件， 是社会生活的物质方面，主要包括自然地理环境、 人口因素和物质\n生产方式\n1.自然地理环境是指与人类社会所处的地理位置相联系的自然条件的总和， 是人类社会生\n存和发展永恒的、必要的条件，是人们生活和生产的自然基础。\n2.人口因素也是重要的社会物质生活条件，对社会发展具有影响和制约作用。\n3.物质生产方式， 即马克思所说的“物质生活的生产方式”， 通常简称为生产方式， 是指人们\n为获取物质生活资料而进行的生产活动的方式,是生产力和生产关系的统一体。物质生产方式\n是社会存在和发展的基础及决定力量。", "keywords": ["自然地理环境", "人口因素", "物质生产方式", "物质生活的生产方式", "生产力", "生产关系", "决定力量"]}, {"no": 25, "chapter": "第三章", "section": "提纲", "question": "社会意识主要包括哪些方面？p.127-129", "answer": "社会意识是社会存在的反映，是社会生活的精神方面。社会意识具有复杂的\n结构，可以从不同角度对其进行划分。\n1.根据不同的主体， 社会意识可分为个体意识和群体意识。 个体意识是个人的生活经历和\n社会地位等在自己头脑中的反映，是个体社会实践的产物；\n群体意识是群体成员共同的意识，是群体实践的产物。\n4.根据不同的层次，社会意识可分为社会心理和社会意识形式。社会心理是低层次的社会\n意识，是自发的、不系统的、不 定型的社会意识，表现为人们的感知、情绪、情感、心态、\n习俗等，以感性认识为主；社会意识形式是高层次的社会意识，是自觉的、系统的、相对稳定\n的社会意识，包括政治法律思想、道德、艺术、宗教、哲学、科学等，以理性认识为主。社会\n意识形式以社会心理为基础，并对社会心理起指导和影响作用。\n20. 社会存在与社会意识的辩证关系及其对树立科学历史观和指导文化建设的\n重要意义？ p.129-132\n（1） 辩证关系： ①社会存在是社会意识内容的客观来源,社会意识是社会物质生活\n过程 及其条件的主观反映。\n②社会意识是人们进行社会物质交往的产物。\n③社会意识是具体的、历史的。\n④社会意识有相对独立性：社会存在决定社会意识的同时，社会意识还具有自身特有的\n发展形式和发展规律。\na.社会意识与社会存在发展具有不完全同步性和不平衡性。\nb.社会意识内部各种形式之间存在相互影响且各自具有历史\n继承性。\nc.社会意识对社会存在具有能动的反作用，这是社会意识相对\n独立性的突出表现。\n⑤社会意识的能动作用是通过指导人们的实践活动实现的。\n（2） 重要意义： ①社会存在和社会意识辩证关系原理对于我们树立科学历史观 、正\n确认识社会历史具有重要意义。\n②社会存在和社会意识辩证关系原理对于社会发展包括社会文化建设具 有重要指导意\n义。\n③文化是社会意识的重要组成部分。文化对社会发展有重要作用，表现在：\na. 文化为社会发展提供思想保证。\nb. 文化为社会发展提供精神动力.\nc. 文化为社会发展提供智力支持。\nd. 文化为社会发展提供凝聚力量。\n④哲学科学社会是文化的重要组成部分，其发展水平反映了一个民族的思维能力、精\n神品格、文明素养，体现了一个国家的综合国力和国际竞争力。\n26. 生产力与生产关系的矛盾运动及其规律是什么，其理论意义与现实意义有\n哪些？p.132-137\n27.经济基础与上层建筑的矛盾运动及其规律是什么，其理论意义与现实意义 有哪\n些？p.137-141\n1.基本内容：①经济基础决定上层建筑的产生、性质和发展变化的方向；②\n上层建筑的反作用取决于和服务于经济基础的性质和要求。\n2.意义：①理论意义： 观察和研究社会历史的一把钥匙， 对于每一历史时期的政治法律制\n度和设施以及宗教的、哲学的和其他的观念形式，都可以从社会的经济基础中得到科学的说\n明；②现实意义：我国进行社会主义政治体制改革和建设社会主义精种文明的客观依据。\n28. 如何理解社会进步与人的发展的关系，以及社会形态更替的统一性和多样性、\n必然性与选择性？p.145-149\na) 社会进步促进人的发展。\nb) 社会进步推动人类解放。\n社会形态更替的必然性主要是指社会形态依次更替的过程和规律是客观的，其发展的基\n本趋势是确定不移的。\n但是 ，如同其他社会规律一样， 社会形态更替的规律也是人们自己的社会行动的规律。 规\n律的客观性并不否定人们历史活动的能动性，并不排斥人们在遵循社会发展规律的基础上，\n对于某种社会形态的历史选择性。\n1. 社会发展的必然性造成了一定历史阶段社会发展的基本趋势,为人们的历史选择\n提供了基础、范围和可能性空间。\n2. 社会形态更替的过程也是一个主观能动性与客观规律性相统一的过程。\n3. 人们的历史选择性归根结底是人民群众的选择性。", "keywords": ["社会意识形式", "科学历史观", "相对独立性", "社会存在决定社会意识", "经济基础决定上层建筑", "社会发展规律", "主观能动性"]}, {"no": 26, "chapter": "第三章", "section": "提纲", "question": "社会存在与社会意识的辩证关系及其对树立科学历史观和指导文化建设的 重要意义 p.129-132", "answer": "1. 社会存在决定社会意识。社会意识的内容来源于社会存在，社会意识随社会存在的发展变化而发展变化。\n2. 社会意识具有相对独立性：它同社会存在的发展不完全同步；不同社会意识形式之间相互影响；先进社会意识能够促进社会发展，落后社会意识会阻碍社会发展。\n3. 理论意义：这一原理揭示了社会历史发展的真实基础，帮助我们反对历史唯心主义，树立科学历史观。\n4. 现实意义：文化建设必须立足社会实践和人民生活，坚持先进文化方向；同时要发挥科学理论、核心价值观和优秀文化对社会发展的能动作用。", "keywords": ["社会存在决定社会意识", "相对独立性", "社会意识形式", "社会历史发展", "历史唯心主义", "先进文化", "科学理论"]}, {"no": 27, "chapter": "第三章", "section": "提纲", "question": "生产力与生产关系的矛盾运动及其规律是什么，其理论意义与现实意义有哪些？p.132-137", "answer": "1. 生产力决定生产关系。生产力的状况决定生产关系的性质，生产力的发展要求生产关系作出相应变革。\n2. 生产关系反作用于生产力。适合生产力状况的生产关系促进生产力发展，不适合的生产关系阻碍生产力发展。\n3. 规律内容：生产关系一定要适合生产力状况。这是人类社会发展的基本规律之一。\n4. 理论意义：揭示社会发展的物质根源和制度变迁的深层原因。\n5. 现实意义：必须坚持解放和发展生产力，不断调整完善生产关系，使制度安排更好适应高质量发展要求。", "keywords": ["生产力决定生产关系", "反作用", "适合生产力状况", "解放和发展生产力"]}, {"no": 28, "chapter": "第三章", "section": "提纲", "question": "经济基础与上层建筑的矛盾运动及其规律是什么，其理论意义与现实意义有 哪些？p.137-141", "answer": "1. 经济基础决定上层建筑的产生、性质和发展方向；上层建筑反作用于经济基础。\n2. 当上层建筑适合经济基础并服务于先进生产力发展时，就促进社会发展；反之就会阻碍社会发展。\n3. 规律内容：上层建筑一定要适合经济基础状况。\n4. 理论意义：为观察政治、法律、制度和意识形态现象提供了历史唯物主义方法。\n5. 现实意义：推进国家治理体系和治理能力现代化，必须使制度、法律、政策和意识形态建设同经济社会发展要求相适应。", "keywords": ["经济基础决定上层建筑", "适合经济基础状况", "意识形态", "历史唯物主义", "国家治理体系", "治理能力现代化"]}, {"no": 29, "chapter": "第三章", "section": "提纲", "question": "如何理解社会形态更替的统一性和多样性、必然性与选择性？p.145-149", "answer": "1. 社会形态更替具有统一性。人类社会发展总体上遵循由低级到高级的发展规律。\n2. 社会形态更替具有多样性。不同国家和民族由于历史条件、文化传统、发展道路不同，具体过程和实现形式各不相同。\n3. 社会形态更替具有必然性。社会基本矛盾运动决定社会形态终究要发生更替。\n4. 社会形态更替又具有选择性。人民群众在一定历史条件下通过实践选择发展道路，选择性以客观规律和现实条件为基础。\n5. 要把历史发展的客观规律同人民群众的主体选择统一起来理解。", "keywords": ["社会基本矛盾", "人民群众"]}, {"no": 30, "chapter": "第三章", "section": "提纲", "question": "如何理解社会基本矛盾是社会发展的根本动力？p.151-154", "answer": "1. 社会基本矛盾包括生产力和生产关系、经济基础和上层建筑的矛盾。\n2. 这两对矛盾贯穿社会发展全过程，规定社会发展的基本性质和基本趋势。\n3. 生产力是社会基本矛盾运动中最基本的动力因素；生产关系、上层建筑的变革归根到底要适应生产力发展。\n4. 社会基本矛盾通过阶级斗争、社会革命、改革、科技进步等形式表现出来并推动社会前进。\n5. 因而，社会基本矛盾是社会发展的根本动力。", "keywords": ["生产力", "生产关系", "经济基础", "上层建筑", "基本趋势", "改革"]}, {"no": 31, "chapter": "第三章", "section": "提纲", "question": "改革在社会发展中的作用以及对当前全面深化改革的理解 p.161-162", "answer": "1. 改革是在一定社会制度内部，通过调整不适应生产力发展的生产关系和上层建筑，推动社会发展的重要动力。\n2. 改革是解决社会主义社会基本矛盾的有效途径，是社会主义制度自我完善和发展的过程。\n3. 当前全面深化改革，根本目的在于解放和发展社会生产力、解放和增强社会活力，推进国家治理体系和治理能力现代化。\n4. 必须坚持正确方向，坚持问题导向，坚持系统观念，把改革同发展、稳定、民生和制度建设统一起来。", "keywords": ["生产关系", "上层建筑", "社会基本矛盾", "自我完善", "国家治理体系", "治理能力现代化"]}, {"no": 32, "chapter": "第三章", "section": "提纲", "question": "如何理解科学技术是第一生产力及其在社会发展中的作用？p.162-166", "answer": "1. 科学技术渗透到生产力各要素之中，能够提高劳动者素质、改进劳动资料、扩大劳动对象，转化为现实生产力。\n2. 科学技术是先进生产力的集中体现和主要标志，是推动经济社会发展的强大杠杆。\n3. 科学技术促进生产方式、生活方式和思维方式变革，推动社会分工、产业结构和治理方式更新。\n4. 科学技术作用具有两重性，必须坚持正确价值导向，使科技发展服务人民、服务社会进步。", "keywords": ["现实生产力", "生产方式", "生活方式", "社会分工", "两重性"]}, {"no": 33, "chapter": "第三章", "section": "提纲", "question": "如何理解文化在社会发展中的作用？p.166-168", "answer": "1. 文化是社会意识的重要组成部分，对社会发展具有能动作用。\n2. 先进文化能够凝聚社会共识、塑造价值观念、提高人的素质，为社会发展提供思想保证、精神动力和智力支持。\n3. 文化通过教育、舆论、制度、风俗等形式影响人的实践活动和社会运行。\n4. 落后腐朽文化会阻碍社会进步。必须发展面向现代化、面向世界、面向未来的，民族的科学的大众的社会主义文化。", "keywords": ["社会意识", "能动作用", "先进文化", "价值观念", "精神动力"]}, {"no": 34, "chapter": "第三章", "section": "提纲", "question": "如何理解人民群众在创造历史过程中的决定作用及坚持以人民为中心的思想？p.172-175", "answer": "1. 人民群众是社会物质财富的创造者，是推动生产力发展的主体力量。\n2. 人民群众是社会精神财富的创造者，人民实践是思想文化创造的源泉。\n3. 人民群众是社会变革的决定力量，历史发展归根到底要通过人民群众的实践实现。\n4. 坚持以人民为中心，就是坚持人民主体地位，把人民对美好生活的向往作为奋斗目标，依靠人民创造历史伟业。", "keywords": ["物质财富", "生产力", "精神财富", "社会变革", "决定力量", "人民主体地位"]}, {"no": 35, "chapter": "第四章", "section": "提纲", "question": "商品经济及其产生的历史条件是什么？p.183-184", "answer": "（1）商品经济：以交换为目的而进行生产的经济形式，是一定社会历史条件的产物。\n（2）商品经济产生的历史条件： ①存在社会分工，\n② 生产资料和劳动产品属于不同的所有者。", "keywords": ["交换", "目的", "社会分工", "生产资料", "劳动产品"]}, {"no": 36, "chapter": "第四章", "section": "提纲", "question": "什么是商品？商品的二因素和劳动的二重性分别是什么？p.184-186", "answer": "（1） 商品：用来交换、能满足人的某种需要的劳动产品，具有使用价值和价值\n两个因素或两种属性，是使用价值和价值的矛盾统一体。\n（2） 商品二因素： ①使用价值：商品能满足人的某种需要的有用性,反映的是人与\n自然之间的物质关系， 是商品的自然属性， 是一切劳动产品所共有的属性， 离开了它商品就不\n复存在。使用价值构成社会财富的物质内容。\n②价值：凝结在商品中的无差别的一般人类劳动，即人的\n脑力和体力的耗费。价值是商品所特有的社会属性。\n（1）生产商品的劳动的二重性： ①具体劳动：生产一定使用价值的具体形式\n的劳动。（特殊）\n②抽象劳动：撇开一切具体形式的、无差别\n的一般人类劳动，即人的脑力和体力的耗费。（一般）\n劳动二重性决定商品二因素，生产商品的具体劳动创造商品的使用价值，\n抽象劳动形成商品的价值。\n36 商品的价值的质的规定和量的规定以及商品价值量的决定要素   p.186-188\n价值的质的规定—— 价值的实体是什么\n价值的量的规定—— 价值的大小由什么决定和怎样决定\n商品价值量的决定要素 ----------- 该商品消耗的社会必要劳动时间\n37 价值规律的内容、表现形式及作用是什么？p.189-191\n内容： 商品的价值量由生产商品的社会必要劳动时间决定 ，商品交换以价值量为基础，按\n照等价交换的原则进行。\n表现形式：商品的价格围绕商品的价值自发波动。\n（3 作用：价值规律在市场配置资源过程中的积极作用：\n①自发地调节生产资料和劳动力在社会各生产部门之间的分配比例。\n②自发地刺激社会生产力的发展。\n③自发地调节社会收入的分配。\n消极作用：\n①导致社会资源浪费。\n② 阻碍技术进步。\n③  导致收入两极分化。\n38 为什么说私人劳动和社会劳动的矛盾构成私有制商品经济的基本矛盾 ？\np.191-193\n（1）私人劳动和社会劳动的矛盾决定着商品经济的本质及发展过程。\n（2）私人劳动和社会劳动的矛盾是商品经济其他一切矛盾的基础。\n（3）私人劳动和社会劳动的矛盾决定着商品生产者的命运。", "keywords": ["劳动产品", "使用价值", "具体劳动", "抽象劳动", "社会必要劳动时间", "等价交换", "积极作用"]}, {"no": 37, "chapter": "第四章", "section": "提纲", "question": "商品价值量及影响因素 p.186-188", "answer": "1. 商品价值量由生产商品所耗费的社会必要劳动时间决定。\n2. 社会必要劳动时间是在现有社会正常生产条件下，在社会平均劳动熟练程度和劳动强度下制造某种使用价值所需要的劳动时间。\n3. 商品价值量同社会必要劳动时间成正比，同劳动生产率成反比。\n4. 影响商品价值量的因素主要有劳动生产率、劳动复杂程度、劳动强度和社会生产条件等。", "keywords": ["社会必要劳动时间", "使用价值", "劳动生产率", "成反比", "劳动复杂程度"]}, {"no": 38, "chapter": "第四章", "section": "提纲", "question": "价值规律的内容、表现形式及作用是什么？p.189-191", "answer": "1. 价值规律的内容：商品价值量由生产商品的社会必要劳动时间决定，商品交换以价值量为基础实行等价交换。\n2. 表现形式：价格围绕价值上下波动。价格受供求关系影响，但长期看受价值制约。\n3. 作用：自发调节生产资料和劳动力在社会各部门之间的分配；刺激商品生产者改进技术、改善经营、提高劳动生产率；促使商品生产者优胜劣汰。\n4. 价值规律在私有制商品经济中具有自发性和盲目性，需要在现实经济运行中正确认识和调节。", "keywords": ["社会必要劳动时间", "等价交换", "价格围绕价值", "生产资料", "提高劳动生产率", "优胜劣汰"]}, {"no": 39, "chapter": "第四章", "section": "提纲", "question": "为什么说私人劳动和社会劳动的矛盾构成私有制商品经济的基本矛盾？ p.191-193", "answer": "1. 私人劳动是商品生产者作为私人所进行的劳动，社会劳动是作为社会总劳动组成部分的劳动。\n2. 在私有制商品经济中，生产资料私有和社会分工使劳动既表现为私人劳动，又必须通过交换证明其社会性。\n3. 私人劳动能否转化为社会劳动，取决于商品能否卖出并实现价值。\n4. 这一矛盾决定商品生产者的命运，集中体现商品经济中使用价值和价值、具体劳动和抽象劳动等矛盾，因此构成私有制商品经济的基本矛盾。", "keywords": ["生产资料", "社会分工", "交换", "使用价值", "具体劳动", "抽象劳动"]}, {"no": 40, "chapter": "第四章", "section": "提纲", "question": "根据劳动力商品的价值和使用价值的特点，理解剩余价值的来源 p.205-206", "answer": "1. 劳动力成为商品，是资本主义生产的前提。劳动力商品的价值由生产、发展、维持和延续劳动力所必需的生活资料价值决定。\n2. 劳动力商品的特殊使用价值在于它能够创造价值，并且能够创造出大于自身价值的价值。\n3. 资本家购买劳动力后，在生产过程中让工人劳动超过补偿劳动力价值所需的必要劳动时间，形成剩余劳动。\n4. 剩余价值来源于雇佣工人的剩余劳动，而不是来源于流通、机器或资本自身。", "keywords": ["特殊使用价值", "劳动力价值", "必要劳动时间", "剩余劳动"]}, {"no": 41, "chapter": "第四章", "section": "提纲", "question": "剩余价值定义、剩余价值规律及资本的本质 p.206-209", "answer": "1. 剩余价值是雇佣工人在生产过程中创造的、被资本家无偿占有的超过劳动力价值的价值。\n2. 剩余价值规律是资本主义生产方式的绝对规律，资本主义生产的直接目的和决定动机就是无偿占有剩余价值。\n3. 资本不是物，而是能够带来剩余价值的价值，是资本家剥削雇佣劳动的社会关系。\n4. 资本的本质体现为资本主义生产关系，即资本对雇佣劳动的支配和剥削。", "keywords": ["剩余价值", "无偿占有", "绝对规律", "资本", "雇佣劳动", "生产关系"]}, {"no": 42, "chapter": "第四章", "section": "提纲", "question": "根据不变资本和可变资本的区分，理解剩余价值的源泉 p.206-209", "answer": "1. 不变资本是以生产资料形式存在的资本，在生产过程中只转移原有价值，不发生价值量增殖。\n2. 可变资本是以劳动力形式存在的资本，在生产过程中能够创造出大于自身价值的新价值。\n3. 区分不变资本和可变资本，揭示了剩余价值的真正源泉是可变资本所购买的劳动力的使用，即雇佣工人的剩余劳动。\n4. 机器、原料等生产资料是剩余价值生产的条件，不是剩余价值的源泉。", "keywords": ["生产资料", "真正源泉", "剩余劳动"]}, {"no": 43, "chapter": "第四章", "section": "提纲", "question": "生产剩余价值的基本方法有哪些？p.209-212", "answer": "绝对剩余价值的生产\n绝对剩余价值：在必要劳动时间不变的条件下，由于延长工作日的长度或提高劳动强度而\n生产的剩余价值。\n相对剩余价值的生产\n相对剩余价值：在工作日长度不变的条件下，通过缩短必要劳动时间而相对延长。\n剩余劳动时间所生产的剩余价值。\n43. 为什么说 “无人工厂 ”的出现没有改变雇佣工人的剩余劳动仍然是剩余价值\n的唯 一源泉？ p.212\n资本主义条件下的生产自动化只是意味着剩余价值生产所使用的生产工具更加先进了，\n不论是机器人、自动化生产线，还是“无人工厂”，在本质上依然是物化劳动 或不变资本的\n实物形式，它们在参加产品的生产时,  只是 把原有的价值转移到产品中去，而不创造新价\n值， 更不能创造剩余价值。 在生产自动化条件下， 直接从事生产劳动的工人相对减少， 而从\n事科研、设计、技术和管理劳动的人员日益增加，“ 总体工人”中脑力劳动者的比重不断增\n大。劳动的复杂程度和强度日益提高，生产力日益提升，从 而创造出更多的价值和剩余价值。\n总之，资本主义条件下的生产自动化是人类社会科学技术进步的结晶，它的普遍采用会大幅度提\n高劳动生产率， 使资本家获得比过去更多的剩余价值。资本主义条件下的生产自动化是资本家\n获取高额剩余价值的手段，而雇佣工人的剩余劳动仍然是这种剩余价值的唯一源泉\n44 资本积累的含义及马克思主义资本积累学说，本质，历史趋势 p.213-216\n含义：把剩余价值转化为资本/剩余价值的资本化\n马克思主义资本积累学说： 马克思关于资本积累的理论是剩余价值学说的重要组成部分，它\n揭露了资本主义制度下贫富两极分化的原因，揭示了资本主义失业现象的本质, 深刻地阐明了\n资本主义制度必然走向灭亡的历史命运。\n本质：不断利用，无常占有由工人创造的价值来扩大自己的基本规模，进一步扩大和加强\n对工人剥削和统治。\n历史趋势：资本主义制度必然灭亡和社会主义制度必然胜利。", "keywords": ["绝对剩余价值", "必要劳动时间", "延长工作日", "相对剩余价值", "无人工厂 ", " 总体工人", "劳动生产率", "剩余价值学说"]}, {"no": 44, "chapter": "第四章", "section": "提纲", "question": "为什么说“无人工厂”的出现没有改变雇佣工人的剩余劳动仍然是剩余价值 的唯一源泉？p.212", "answer": "1. “无人工厂”提高了自动化程度，但机器、算法和设备本身属于不变资本，只能把自身价值转移到产品中，不能创造新价值。\n2. 剩余价值的唯一源泉仍然是雇佣工人的剩余劳动，包括研发、设计、维护、管理、数据标注、系统运行等社会劳动。\n3. 自动化会改变劳动形式和劳动组织方式，但没有改变资本主义生产中资本对雇佣劳动的支配关系。\n4. 因此，“无人工厂”并没有推翻劳动价值论，也没有改变剩余价值来源于剩余劳动这一基本原理。", "keywords": ["不变资本", "不能创造新价值", "社会劳动", "雇佣劳动", "劳动价值论", "来源"]}, {"no": 45, "chapter": "第四章", "section": "提纲", "question": "资本积累的含义、本质及历史趋势 p.213-216", "answer": "1. 资本积累是把剩余价值转化为资本，或者说剩余价值资本化。\n2. 资本积累的本质，是资本家不断扩大对雇佣劳动的剥削和支配，以实现资本增殖。\n3. 资本积累会带来资本规模扩大、资本有机构成提高、相对过剩人口形成和贫富两极分化。\n4. 资本积累的历史趋势，是资本主义基本矛盾不断加深，为资本主义向社会主义过渡准备物质条件和社会力量。", "keywords": ["剩余价值资本化", "雇佣劳动", "资本有机构成", "相对过剩人口", "两极分化", "基本矛盾", "物质条件"]}, {"no": 46, "chapter": "第四章", "section": "提纲", "question": "资本的有机构成及资本有机构成提高的一般趋势 p.214-215", "answer": "1. 资本有机构成是由资本技术构成决定并反映技术构成变化的资本价值构成，通常表现为不变资本和可变资本的比例。\n2. 随着资本主义生产的发展，技术进步和机器体系扩大，使不变资本比重提高，可变资本相对下降。\n3. 资本有机构成提高的一般趋势，会导致相对过剩人口形成，加剧资本积累和资本主义基本矛盾。\n4. 这一趋势体现资本主义生产社会化同资本主义私人占有之间矛盾的发展。", "keywords": ["资本技术构成", "资本价值构成", "不变资本", "可变资本", "相对过剩人口", "资本积累", "基本矛盾", "生产社会化"]}, {"no": 47, "chapter": "第四章", "section": "提纲", "question": "怎样理解工资的本质及其对资本主义剥削关系的掩盖？p.219-220", "answer": "（1）资本主义工资的本质： 在资本主义制度下， 工人的工资表现为劳动力的价值或价格。\n（2）掩盖：在现实的资本主义经济生活中，资本家并不是把剩余价值看作可变资本的产\n物， 而是把它看作全部预付资本的产物或增加额， 剩余价值便取得了利润的形态。 当剩余价值\n转化为利润时， 剩余价值率也转化为利润率。 剩余价值率是剩余价值与可变资本的比率， 反映\n的是资本家对工人的剥削程度；利润率则是剩余价值与全部预付资本的比率，反映的是预付\n总资本的增殖程度，掩盖了资本家对工人的剥削。", "keywords": ["剩余价值", "可变资本"]}, {"no": 48, "chapter": "第四章", "section": "提纲", "question": "资本主义基本矛盾及其具体表现 p.222-223", "answer": "1）资本主义基本矛盾：生产社会化和生产资料资本主义私人占有之间的矛盾。\n（2）具 体表现： 资本主义所特有的生产社会化和生产资料资本主义私人占有之间的矛盾\n形成。这是生产力和生产关系之间的矛盾在资本主义社会的具体表现。", "keywords": ["生产社会化", "生产资料", "私人占有", "生产力", "生产关系"]}, {"no": 49, "chapter": "第四章", "section": "提纲", "question": "资本主义经济危机的表现、产生的根本原因和本质特征 p.223-225", "answer": "1. 资本主义经济危机通常表现为商品大量积压、企业倒闭、生产下降、工人失业、信用关系破坏和社会经济生活混乱。\n2. 根本原因是资本主义基本矛盾，即生产社会化和生产资料资本主义私人占有之间的矛盾。\n3. 具体表现为生产无限扩大的趋势同劳动人民有支付能力的需求相对缩小之间的矛盾，以及个别企业生产有组织性同整个社会生产无政府状态之间的矛盾。\n4. 本质特征是生产相对过剩，即相对于劳动人民有支付能力的需求而言的过剩。", "keywords": ["基本矛盾", "生产社会化", "生产资料", "私人占有", "有支付能力的需求", "有组织性", "无政府状态", "生产相对过剩"]}, {"no": 50, "chapter": "第五章", "section": "提纲", "question": "什么是垄断？p.238", "answer": "垄断：少数资本主义大企业为了获得高额利润，通过相互协议或联合，对一个或几个部门\n商品的生产、销售和价格进行操纵和控制。", "keywords": ["垄断", "商品", "操纵和控制"]}, {"no": 51, "chapter": "第五章", "section": "提纲", "question": "什么是金融资本和金融寡头？p.240-241", "answer": "（1）金融资本：由工业垄断资本和银行垄断资本融合在一起而形成的一种垄断资本。（2）\n金融寡头：操纵国民经济命脉，并在实际上控制国家政权的少数垄断资本家或垄断资本家集\n团。", "keywords": ["金融资本", "银行垄断资本", "金融寡头"]}, {"no": 52, "chapter": "第五章", "section": "提纲", "question": "经济全球化的表现主要有哪些方面？p.252-253", "answer": "1. 生产全球化：生产过程和产业链在世界范围内分工协作。\n2. 贸易全球化：商品和服务贸易规模扩大，国际市场联系加深。\n3. 金融全球化：资本跨国流动加快，金融市场相互依存增强。\n4. 企业经营全球化：跨国公司在全球配置资源、组织生产和销售。", "keywords": ["生产全球化", "贸易全球化", "商品", "联系", "金融全球化", "相互依存", "企业经营全球化"]}, {"no": 53, "chapter": "第五章", "section": "提纲", "question": "经济全球化对发展中国家的积极作用和负面影响有哪些，以及我们应该如何 应对经济全球化？p.254-257", "answer": "1. 积极作用：有利于发展中国家引进资金、技术和管理经验，扩大市场，参与国际分工，推动产业升级和经济发展。\n2. 负面影响：可能加深对发达资本主义国家的依赖，带来金融风险、产业冲击、资源环境压力和贫富差距扩大。\n3. 经济全球化本质上由资本逻辑推动，规则和利益分配并不平等。\n4. 应对方式：坚持独立自主，扩大高水平开放，维护国家经济安全，提升自主创新能力，推动建设开放型世界经济和更加公正合理的国际经济秩序。", "keywords": ["依赖", "本质", "资本逻辑", "独立自主", "经济安全"]}, {"no": 54, "chapter": "第五章", "section": "提纲", "question": "如何理解资本主义的历史地位以及资本主义为社会主义所代替的历史必然性？p.273-276", "answer": "1. 资本主义在历史上曾推动生产力巨大发展，促进世界市场形成，创造出比以往社会更高的物质文明。\n2. 资本主义又以雇佣劳动剥削为基础，存在生产社会化和资本主义私人占有之间的基本矛盾。\n3. 这一基本矛盾导致经济危机、两极分化、社会冲突和人的片面发展，资本主义无法从根本上克服自身矛盾。\n4. 社会主义代替资本主义是生产关系一定要适合生产力状况这一规律作用的结果，是历史发展的必然趋势，但实现过程是长期、复杂、曲折的。", "keywords": ["雇佣劳动", "生产社会化", "私人占有", "基本矛盾", "经济危机", "两极分化", "生产关系", "适合生产力状况"]}, {"no": 55, "chapter": "第六章", "section": "提纲", "question": "世界社会主义五百年的发展历程 p.279-293", "answer": "科学社会主义基本原则是社会主义事业发展规律的集中体现,是马克思主义政党\n领导人民进行社会主义革命、建设、改革的基本遵循。\n（1） 资本主义必然灭亡，社会主义必然胜利。\n（2） 无产阶级是最先进最革命的阶级，肩负着推翻资本主义旧世界、 建立社会主义和\n共产主义新世界的历史使命。\n（3） 无产阶级革命是无产阶级进行斗争的最高形式，以建立无产阶级专政的国家为目\n的。\n（4） 社会主义社会要在生产资料公有制基础上组织生产，以满足全体社会成员的需要\n为生产的根本目的。\n（5） 社会主义社会要对社会生产进行有计划的指导和调节，实行按劳分配原则。\n（6） 社会主义社会要合乎自然规律地改造和利用自然，努力实现人与自然的和\n谐共生。\n（7） 社会主义社会必须坚持科学的理论指导，大力发展社会主义先进文化。\n（8） 无产阶级政党是无产阶级的先锋队， 社会主义事业必须始终坚持无产阶级政党的\n领导。\n（9） 社会主义社会要大力解放和发展生产力，逐步消灭剥削和消除两极分化，实现共\n同富裕和社会全面进步，并最终向共产主义社会过渡。\n（10） 共产主义是人类最美好的社会，实现共产主义是共产党人的最高理想。", "keywords": ["科学社会主义", "生产资料公有制", "按劳分配", "先进文化", "无产阶级政党", "解放和发展生产力"]}, {"no": 56, "chapter": "第六章", "section": "提纲", "question": "科学社会主义与空想社会主义的区别 p.280-282", "answer": "1. 理论基础不同。空想社会主义主要建立在道义批判和理性设想之上；科学社会主义建立在唯物史观和剩余价值学说基础上。\n2. 对社会发展规律的认识不同。空想社会主义没有揭示资本主义灭亡和社会主义胜利的客观规律；科学社会主义揭示了资本主义基本矛盾和社会主义代替资本主义的历史必然性。\n3. 对实现力量的认识不同。空想社会主义找不到改造社会的现实力量；科学社会主义指出无产阶级是最先进最革命的阶级，是实现社会主义的现实力量。\n4. 实现途径不同。空想社会主义往往寄希望于少数天才人物、道德感化或试验示范；科学社会主义强调通过无产阶级政党领导的人民群众实践和社会变革来实现。\n5. 历史地位不同。空想社会主义是科学社会主义的重要思想来源；科学社会主义使社会主义由空想变为科学。", "keywords": ["理论基础不同", "唯物史观", "剩余价值学说", "社会发展规律", "现实力量", "无产阶级", "实现途径不同", "由空想变为科学"]}, {"no": 57, "chapter": "第六章", "section": "提纲", "question": "科学社会主义基本原则的主要内容有哪些方面？p.294-302", "answer": "第一， 资本主义必然灭亡， 社会主义必然胜利。(两个必然)(两个决不会:“无论哪一种社会\n形态，在它所能容纳的全部生产力发挥出来以前，是决不会灭亡的，而新的更高的生产关系，\n在它的物质存在条件在旧社会的胎胞里成熟以前，是决不会出现的。”)\n第二，无产阶级是最先进最革命的阶级，肩负着推翻资本主义旧世界、建立社会主义和共\n产主义新世界的历史使命。(无产阶级是资本主义“掘墓人”和共产主义建设者!)\n第三，无产阶级革命是无产阶级进行斗争的最高形式，以建立无产阶级专政的国家为目的。\n第四，社会主义社会要在生产资料公有制基础上组织生产,以满足全体社会成员的需要为生\n产的根本目的。\n第五， 社会主义社会要对社会生产进行有计划的指导和调节，实行按劳分配原则。第六， 社会\n主义社会要合乎自然规律地改造和利用自然，努力实现人与自然的和谐共生。\n第七， 社会主义社会必须坚持科学的理论指导， 大力发展社会主义先进文化。第八，无产\n阶级政党是无产阶级的先锋队，社会主义事业必须坚持无产阶级政党的领导。\n第九， 社会主义社会要大力解放和发展生产力， 逐步消灭剥削和消除两极分化， 实现共同\n富\n裕和社会全面进步，并最终向共产主义社会过渡。\n第十，共产主义是人类最美好的社会，实现共产主义是共产党人的最高理想 57.如何\n正确把握科学社会主义基本原则并坚持和发展中国 特色社会主义？  p.302-307\n科学社会主义基本原则与中国特色社会主义\n①中国特色社会主义始终坚持科学社会主义基本原则。\n②中国特色社会主义实现了科学社会主义基本原则与当代中国实际、中华优秀传统文化\n的有机结合。\n③中国特色社会主义既坚持了科学社会主义基本原则，又具有鲜明的民族特色和时代特\n色。（10 个坚持）\n④习近平新时代中国特色社会主义思想，是在中国特色社会主义进入新时代、当今世\n界经历新变局、我们党面临执政新考验的历史条件下形成和发展起来的，标志着我们党在自\n觉把科学社会主义基本原则与中国实际和时代特征相结合上 达到了新的境界。", "keywords": ["生产关系", "生产资料公有制", "无产阶级政党", "解放和发展生产力", "中国特色社会主义", "中华优秀传统文化"]}, {"no": 58, "chapter": "第六章", "section": "提纲", "question": "如何正确把握科学社会主义基本原则并坚持和发展中国特色社会主义？ p.302-307", "answer": "1. 科学社会主义基本原则必须同各国具体实际相结合，不能把原则教条化、模式化。\n2. 坚持科学社会主义基本原则，核心是坚持无产阶级政党领导、人民主体地位、生产资料公有制方向、共同富裕目标和人的自由全面发展。\n3. 发展中国特色社会主义，是科学社会主义理论逻辑和中国社会发展历史逻辑的统一。\n4. 必须坚定道路自信、理论自信、制度自信、文化自信，在实践中不断推进理论创新和制度创新。", "keywords": ["具体实际", "无产阶级政党", "人民主体地位", "生产资料公有制", "共同富裕", "人的自由全面发展"]}, {"no": 59, "chapter": "第七章", "section": "提纲", "question": "“共产主义”一词有哪三层含义 p.324", "answer": "（1） 共产主义思想体系，即“马克思主义”或“科学社会主义”。\n（2） 共产主义社会，即共产主义远大理想实现之际所建立的人类最美好的社会\n制度。\n（3） 共产主义运动， 即无产阶级和人民群众在无产阶级政党领导下为实现共产主义理\n想", "keywords": ["科学社会主义", "远大理想", "人民群众", "无产阶级政党"]}, {"no": 60, "chapter": "第七章", "section": "提纲", "question": "共产主义社会的基本特征有哪些？p.328-336", "answer": "1.物质财富极大丰富，消费资料按需分配。\n2.社会关系高度和谐，人们精神境界极大提高。\n3.实现每个人自由而全面的发展，人类从必然王国向自由王国飞跃。\n60. 如 何 理 解 实现共 产主义是历史发展的必 然 又 是一个 长期的历史过\n程？\np.337-343\n①资本主义的灭亡和向社会主义的转变是一个长期的过程\nI.资本主义作为一个社会形态，其走向灭亡是一个长期的历史过程。\n不具备主观客观条件下的革命，是不可能成功和建立起共产主义新社会的。\nII.在资本主义何时走向灭亡的问题上，没有人能够未卜先知。\nIII.在资本主义走向灭亡和社会主义革命取得胜利后， 还有一个从资本主义向社会主义转\n变的时期。\n②社会主义社会的充分发展和最终向共产主义过渡需要很长的历史时期\nI.在全世界实现共产主义，首先将取决于社会主义国家的巩固和发展，\n取决于这些国家所经历的社会主义建设的历史进程。\nII.社会主义社会是一个很长的历史时期。\nIII.我国现在尚处在社会主义社会的初级阶段，对于整个社会主义时期究竟会有多长，究\n竟要经历哪些发展阶段，何时才能达到共产主义社会，还需要随着历史的发展进一步认识和探\n索。\nIV.社会主义是共产主义的初级阶段，也是实现共产主义的必由之路。", "keywords": ["物质财富极大丰富", "按需分配", "社会关系高度和谐", "自由而全面的发展", "飞跃"]}, {"no": 61, "chapter": "第七章", "section": "提纲", "question": "如何理解实现共产主义是历史发展的必然又是一个长期的历史过程？ p.337-343", "answer": "1. 共产主义实现具有历史必然性。资本主义基本矛盾的发展、社会化大生产的推进和无产阶级解放运动，为共产主义创造物质条件和社会力量。\n2. 共产主义是人类社会发展规律的必然趋势，体现生产力高度发展、社会关系高度进步和人的自由全面发展。\n3. 共产主义实现又是长期历史过程。旧社会因素的消除、新社会条件的成熟、人的全面发展和世界范围的社会变革都需要长期实践。\n4. 要把远大理想同现实奋斗统一起来，在中国特色社会主义实践中不断为实现共产主义创造条件。", "keywords": ["历史必然性", "基本矛盾", "无产阶级", "社会发展规律", "人的自由全面发展", "长期历史过程", "中国特色社会主义"]}, {"no": 62, "chapter": "第七章", "section": "提纲", "question": "如何理解中国特色社会主义共同理想和共产主义远大理想的关系？ p.343-348 以上内容供同学们复习时参考，另请同学们", "answer": "1.从时间上看，远大理想与共同理想的关系是最终理想与阶段性理想的关系。\n2.从层次上看，远大理想与共同理想的关系是最高纲领与最低纲领的关系。\n3.从范围上看，远大理想与共同理想的关系也是全人类理想与全体中国人民理想的关系。\n必须以辩证思维把握和处理远大理想和共同理想的关系", "keywords": ["远大理想", "共同理想"]}, {"no": "S1", "chapter": "导论", "section": "思考题", "question": "什么是马克思主义？马克思主义具有哪些基本特征？", "answer": "1. 马克思主义是由马克思、恩格斯创立并由后继者不断发展的科学理论体系，是关于自然、社会和人类思维发展一般规律的学说，是关于资本主义发展和转变为社会主义以及社会主义、共产主义发展的普遍规律的学说，是无产阶级和人民群众争取自身解放和人类解放的科学理论。\n2. 马克思主义具有科学性。它以事实为依据，以规律为对象，正确揭示自然、社会和思维发展的本质和规律。\n3. 马克思主义具有人民性。人民至上是马克思主义的政治立场，致力于实现最广大人民的根本利益和人的自由全面发展。\n4. 马克思主义具有实践性。它来自实践、指导实践、接受实践检验，并在实践中不断发展。\n5. 马克思主义具有发展性。它不是封闭僵化的教条，而是随着时代、实践和科学的发展而不断丰富发展的开放理论。\n6. 概括地说，马克思主义的鲜明特征集中体现为科学性和革命性的统一。", "keywords": ["科学理论", "无产阶级", "人民群众", "人民性", "人民至上", "人的自由全面发展", "科学性和革命性的统一"]}, {"no": "S2", "chapter": "导论", "section": "思考题", "question": "1999年，由英国剑桥大学文理学院的教授们发起，就“谁是人类纪元第二个千年第一思想家”进行了校内征询和推选。投票结果是：马克思第一，爱因斯坦第二。随后，英国广播公司以同一问题在全球互联网上公开征询。一个月下来，汇集全球投票结果，仍然是马克思第一，爱因斯坦第二，牛顿和达尔文分别位列第三和第四。这些评选结果对你有何触动和启发？请详细了解评选情况，从与其他上榜思想家的比较中深入认识马克思。", "answer": "1. 这些评选说明，马克思的思想影响不仅属于19世纪，也深刻影响20世纪和21世纪，具有跨时代的解释力和生命力。\n2. 与爱因斯坦、牛顿、达尔文主要在自然科学领域作出划时代贡献不同，马克思揭示了资本主义社会运行规律和人类社会发展规律，直接关系人的解放和社会制度变革。\n3. 马克思创立唯物史观和剩余价值学说，使社会主义由空想变为科学，为无产阶级和人民群众认识世界、改造世界提供了科学武器。\n4. 马克思之所以被广泛认可，根本在于他的理论既深刻批判现实，又指向人类解放，兼具科学深度、现实关怀和实践力量。\n5. 这启发我们学习马克思不能停留在结论记忆上，而要把握其立场、观点、方法，用以分析当代社会现实。", "keywords": ["社会发展规律", "唯物史观", "剩余价值学说", "无产阶级", "人民群众"]}, {"no": "S3", "chapter": "导论", "section": "思考题", "question": "恩格斯指出：“马克思的整个世界观不是教义，而是方法。它提供的不是现成的教条，而是进一步研究的出发点和供这种研究使用的方法。”恩格斯还指出，我们的理论“是一种历史的产物，它在不同的时代具有完全不同的形式，同时具有完全不同的内容”。请结合这一论断，谈谈坚持和发展马克思主义应该秉持什么样的态度。", "answer": "1. 坚持马克思主义，首先要坚持其基本立场、基本观点和基本方法，而不是把个别词句、个别结论当作僵化教条。\n2. 马克思主义是行动指南，不是现成答案库。面对新情况新问题，要用马克思主义方法作具体分析和创造性研究。\n3. 发展马克思主义，必须立足时代变化和实践发展，回应现实提出的新问题，使理论不断获得新的内容和形式。\n4. 坚持和发展是统一的。离开坚持，发展会失去科学方向；离开发展，坚持会变成僵化保守。\n5. 在当代中国，坚持和发展马克思主义，集中体现为推进马克思主义基本原理同中国具体实际相结合、同中华优秀传统文化相结合。", "keywords": ["行动指南", "中国具体实际", "中华优秀传统文化"]}, {"no": "S4", "chapter": "导论", "section": "思考题", "question": "请阅读一篇马克思主义经典论著，并谈谈阅读感受和收获。", "answer": "1. 阅读经典论著，首先能够感受到马克思主义严密的逻辑力量：它不是抽象说教，而是从现实问题出发，通过分析矛盾揭示规律。\n2. 其次能够体会马克思主义鲜明的人民立场。经典著作关注劳动者处境、社会不平等和人的解放，体现深厚的人文关怀。\n3. 再次能够学习马克思主义的方法，如历史分析、阶级分析、矛盾分析、从具体到抽象再回到具体的方法。\n4. 阅读经典还提醒我们，理论必须联系现实。只有把经典观点同当代实践结合起来，才能真正理解其生命力。\n5. 收获在于：既增强理论根基，也提高观察社会、分析问题和辨别思想观点的能力。", "keywords": ["联系"]}, {"no": "S1", "chapter": "第一章", "section": "思考题", "question": "近年来，随着科学技术的飞速发展，人们对物质微观结构层次的认识不断取得新的突破，微观粒子的客观实在性一再获得新的证实。量子叠加、量子纠缠等现象的实验证实，颠覆了许多传统哲学观念，但并没有否定物质的客观实在性。请结合这些新现象，谈谈如何理解马克思主义物质观及其现代意义。", "answer": "1. 马克思主义物质观认为，物质是不依赖于人的意识并能为人的意识所反映的客观实在。这里强调的是“客观实在性”，而不是某种固定的物理形态。\n2. 微观粒子、量子叠加、量子纠缠等新发现改变了人们对物质结构和运动方式的具体认识，但没有否定物质不依赖于意识而存在。\n3. 科学发现越深入，越说明人的认识是发展的，物质世界的具体形态和规律远比日常经验更丰富复杂。\n4. 马克思主义物质观的现代意义在于，它既反对把物质理解为某种僵死实体，也反对因科学观念更新而走向唯心主义或不可知论。\n5. 它为自然科学探索提供世界观基础，要求我们尊重客观实在，坚持实践和科学实验对认识的检验作用。", "keywords": ["依赖", "唯心主义", "不可知论"]}, {"no": "S2", "chapter": "第一章", "section": "思考题", "question": "2017年4月27日，英国著名物理学家斯蒂芬·霍金在北京全球移动互联网大会上重申了他的“人工智能威胁论”，提出人类需警惕人工智能发展的威胁。他认为人工智能一旦脱离束缚，以不断加速的状态重新设计自身，人类由于受到漫长的生物进化的限制，无法与之竞争，将被取代。请思考这段话，谈谈在人工智能飞速发展的条件下，如何认识物质与意识的关系。", "answer": "1. 物质决定意识，意识是人脑的机能，是客观世界在人脑中的主观映象。人工智能是人类实践和意识活动的产物，不是独立于物质世界和人类社会之外的意识主体。\n2. 人工智能能够模拟、扩展人的某些智能功能，在计算、识别、生成和优化等方面超过人类个体，但这不等于具有人类意识。\n3. 人类意识具有社会历史性、目的性、价值性和创造性，离不开人的身体、劳动、语言、交往和社会关系。\n4. 人工智能发展说明意识的能动作用可以通过技术系统外化并增强人的实践能力，但人工智能仍以物质载体、算法、数据和人类目的为条件。\n5. 对人工智能既不能神秘化，也不能轻视风险。应坚持以人为本，发挥其积极作用，同时加强伦理规范、安全治理和社会调适。", "keywords": ["人脑", "主观映象", "人类意识", "社会历史性", "目的", "能动作用", "以人为本", "积极作用"]}, {"no": "S3", "chapter": "第一章", "section": "思考题", "question": "运用矛盾的普遍性和特殊性辩证关系原理，说明中国式现代化的内涵和意义。", "answer": "1. 矛盾的普遍性说明现代化有共同规律，如发展生产力、推进工业化信息化、提高人民生活水平、促进社会治理现代化等。\n2. 矛盾的特殊性说明不同国家的历史条件、社会制度、文化传统、人口规模和发展道路各不相同，现代化不能只有一种模式。\n3. 中国式现代化既遵循现代化一般规律，又立足中国国情，具有中国共产党领导、人口规模巨大、全体人民共同富裕、物质文明和精神文明相协调、人与自然和谐共生、走和平发展道路等特征。\n4. 其意义在于打破“现代化等于西方化”的单一路径，拓展发展中国家走向现代化的途径。\n5. 它体现了马克思主义基本原理同中国具体实际相结合，是矛盾普遍性和特殊性统一的生动实践。", "keywords": ["生产力", "共同富裕", "现代化等于西方化", "中国具体实际"]}, {"no": "S4", "chapter": "第一章", "section": "思考题", "question": "结合党的二十大报告关于系统观念的论述，深入思考系统观念的丰富内涵和现实意义。", "answer": "1. 系统观念要求把事物看成由相互联系、相互作用的要素构成的有机整体，反对孤立、片面、零散地看问题。\n2. 系统观念强调整体与部分、当前与长远、局部与全局、国内与国际、发展与安全等关系的统筹把握。\n3. 它体现唯物辩证法普遍联系和永恒发展的观点，也体现矛盾分析方法和整体性思维。\n4. 现实意义在于，推进中国式现代化和全面深化改革，需要处理复杂利益关系和多重目标，必须增强政策协同和战略统筹。\n5. 坚持系统观念，有助于提高治理能力，防止顾此失彼、单兵突进和短期化倾向。", "keywords": ["普遍联系", "矛盾分析方法", "中国式现代化", "全面深化改革", "治理能力"]}, {"no": "S5", "chapter": "第一章", "section": "思考题", "question": "请谈谈培养和提高创新思维能力的重要性以及如何提高自己的创新思维能力。", "answer": "1. 创新思维能力是认识新情况、解决新问题、开辟新局面的重要能力，是推动理论创新、科技创新、制度创新和实践创新的基础。\n2. 提高创新思维能力，必须打牢知识基础，广泛学习，形成跨学科视野。\n3. 必须坚持问题导向，从现实矛盾和真实需求出发发现问题、分析问题、解决问题。\n4. 必须训练辩证思维，善于从联系、发展、矛盾转化中寻找新思路。\n5. 必须勇于实践，在试错、反思和总结中提高创造性解决问题的能力。\n6. 还要保持开放心态和独立思考，既尊重已有成果，又敢于突破惯性思维。", "keywords": ["理论创新", "制度创新", "实践创新", "问题导向", "联系"]}, {"no": "S1", "chapter": "第二章", "section": "思考题", "question": "毛泽东指出：“我们要建筑中国革命这个房屋，也须先有中国革命的图样。不但须有一个大图样，总图样，还须有许多小图样，分图样。而这些图样不是别的，就是我们在中国革命实践中所得来的关于客观实际情况的能动的反映。”请根据这段论述，谈谈如何理解实践与认识的辩证关系。", "answer": "1. 实践是认识的来源。中国革命的“图样”不是主观臆造的，而是在革命实践中对客观实际情况的反映。\n2. 实践是认识发展的动力。革命实践不断提出新问题，推动人们形成总体方案和具体方案。\n3. 认识对实践具有能动的指导作用。正确的“图样”能够指导革命实践，帮助人们有目的、有计划地改造现实。\n4. 认识必须回到实践中接受检验。方案是否正确，要看能否在实践中解决问题、取得成效。\n5. 实践和认识是循环往复、不断深化的过程：实践、认识、再实践、再认识，推动事业不断前进。", "keywords": ["来源", "目的", "不断深化"]}, {"no": "S2", "chapter": "第二章", "section": "思考题", "question": "为什么说真理既是绝对的又是相对的？把握这一观点对于坚持和发展马克思主义有什么重要意义？", "answer": "1. 真理具有绝对性，因为任何真理都包含不依赖于人的意识的客观内容，都标志着主观同客观相符合。\n2. 真理具有相对性，因为人在一定历史条件下对客观对象的认识总是有限的、不完全的，有待扩展和深化。\n3. 真理的绝对性和相对性相互依存、相互包含。绝对真理存在于相对真理之中，相对真理包含绝对真理的颗粒。\n4. 这一观点要求我们既坚定马克思主义基本原理的真理性，又不能把它教条化、僵化。\n5. 坚持和发展马克思主义，就是在实践中不断丰富和发展真理，使马克思主义随着时代和实践前进。", "keywords": ["绝对性", "依赖", "主观同客观相符合", "相对性", "深化", "相互依存", "相互包含"]}, {"no": "S3", "chapter": "第二章", "section": "思考题", "question": "习近平指出：“世界上没有纯而又纯的哲学社会科学。世界上伟大的哲学社会科学成果都是在回答和解决人与社会面临的重大问题中创造出来的。研究者生活在现实社会中，研究什么，主张什么，都会打下社会烙印。”请谈谈这段论述对于理解真理与价值的辩证统一关系有什么帮助和启示。", "answer": "1. 真理是对客观事物及其规律的正确反映，价值体现客体对主体需要的意义。哲学社会科学研究既要求真理性，也离不开价值立场。\n2. 研究者总处在一定社会关系和历史条件中，研究问题、理论选择和价值判断都会带有社会历史性。\n3. 真理和价值不是割裂的。真正科学的理论应当在揭示客观规律的基础上服务人民和社会进步。\n4. 坚持真理与价值统一，要求哲学社会科学研究立足中国实际，回答时代问题，坚持人民立场。\n5. 启示在于：既不能用主观价值代替客观真理，也不能假装价值中立而回避现实责任。", "keywords": ["正确反映", "社会历史性"]}, {"no": "S4", "chapter": "第二章", "section": "思考题", "question": "对于同一事物，不同的人会有不同的价值判断。那么，面对纷繁的社会现象，面对复杂的价值世界，到底有没有统一的价值评价标准？如果有，这一评价标准是什么？", "answer": "1. 不同主体由于利益、经历、立场和认识水平不同，确实会形成不同价值判断。\n2. 但价值评价并非完全主观任意。科学的价值评价必须以客观事实和社会发展规律为基础。\n3. 在马克思主义看来，人民群众是历史创造者，最广大人民的根本利益是最高价值标准。\n4. 判断一种社会现象或实践活动的价值，应看它是否符合社会发展规律，是否促进生产力发展，是否维护和实现最广大人民的根本利益，是否有利于人的自由全面发展。\n5. 因此，统一的价值评价标准不是抽象个人好恶，而是历史尺度和人民尺度的统一。", "keywords": ["社会发展规律", "人民群众", "生产力", "人的自由全面发展"]}, {"no": "S5", "chapter": "第二章", "section": "思考题", "question": "毛泽东指出：“必然王国之变为自由王国，是必须经过认识与改造两个过程的。欧洲的旧哲学家，已经懂得‘自由是必然的认识’这个真理。马克思的贡献，不是否认这个真理，而是在承认这个真理之后补充了它的不足，加上了根据对必然的认识而‘改造世界’这个真理。”请根据这段论述，谈谈如何理解自由是对必然的认识和对客观世界的改造。", "answer": "1. 必然是客观规律，不能凭主观意志取消。自由不是摆脱规律，而是认识和利用规律。\n2. “自由是对必然的认识”说明，人只有认识客观规律，才能减少盲目性，获得行动主动权。\n3. 马克思主义进一步强调，认识规律不是终点，还要在实践中改造世界，把认识转化为现实力量。\n4. 自由王国的扩大，依赖于人类实践能力、科学技术水平和社会关系的发展。\n5. 因此，自由是认识必然和改造世界的统一，是在尊重客观规律基础上发挥人的能动性。", "keywords": ["现实力量", "依赖", "尊重客观规律"]}, {"no": "S1", "chapter": "第三章", "section": "思考题", "question": "为什么说物质资料的生产方式是社会发展的决定性力量？", "answer": "1. 物质资料生产方式是生产力和生产关系的统一，是人类社会存在和发展的基础。\n2. 人们首先必须生产满足生存需要的物质资料，才能从事政治、法律、文化、艺术、宗教等活动。\n3. 生产方式决定社会的基本结构、性质和面貌，决定社会制度和社会关系的根本特征。\n4. 生产方式的变化会引起社会生活各方面的变化，推动社会形态更替。\n5. 因此，物质资料生产方式是社会发展的决定性力量，但其作用也要通过人的实践活动和社会矛盾运动表现出来。", "keywords": ["生产力", "生产关系", "社会存在"]}, {"no": "S2", "chapter": "第三章", "section": "思考题", "question": "在迎来中国共产党成立100周年的重要时刻，我国脱贫攻坚战取得了全面胜利，完成了消除绝对贫困的艰巨任务，孕育形成了“上下同心、尽锐出战、精准务实、开拓创新、攻坚克难、不负人民”的脱贫攻坚精神。请运用社会意识对社会存在的反作用原理，谈谈精神力量在我国社会发展中的作用。", "answer": "1. 社会存在决定社会意识，脱贫攻坚精神产生于中国脱贫攻坚的伟大实践。\n2. 社会意识具有相对独立性，先进社会意识能够对社会存在产生积极反作用。\n3. 脱贫攻坚精神凝聚共同目标，激发干部群众斗志，形成攻坚克难的价值导向和行动力量。\n4. 精神力量能够通过组织动员、价值引领、制度执行和实践创造转化为现实物质力量。\n5. 在我国社会发展中，伟大精神是推进改革发展稳定、实现民族复兴的重要支撑，但必须同实际行动和制度保障结合起来。", "keywords": ["社会存在决定社会意识", "相对独立性", "改革"]}, {"no": "S3", "chapter": "第三章", "section": "思考题", "question": "请结合我国科学技术的重大成就，如高铁、大飞机以及“天宫”“蛟龙”“天眼”“悟空”“墨子”等，谈谈对科学技术在社会发展中作用的认识。", "answer": "1. 科学技术是第一生产力，能够直接推动生产力发展，提高劳动效率，开辟新的产业和发展空间。\n2. 高铁、大飞机、航天、深海探测、射电望远镜、量子通信等成就，体现科技创新对国家综合实力的支撑作用。\n3. 科学技术推动生产方式、生活方式、交往方式和治理方式变革，深刻影响社会结构和国际竞争格局。\n4. 科技进步也会带来风险和挑战，如伦理、安全、环境和公平问题，需要正确价值导向和制度规范。\n5. 我国必须坚持创新驱动发展战略，把科技自立自强作为国家发展的战略支撑。", "keywords": ["第一生产力", "生产方式", "生活方式", "科技自立自强"]}, {"no": "S4", "chapter": "第三章", "section": "思考题", "question": "请结合人民群众是历史创造者的原理，谈谈对“江山就是人民，人民就是江山”的理解。", "answer": "1. 人民群众是社会物质财富和精神财富的创造者，是社会变革的决定力量。\n2. “江山就是人民，人民就是江山”深刻说明人民是国家政权和事业发展的根基。\n3. 中国共产党来自人民、植根人民、服务人民，党的执政基础在人民，力量源泉在人民。\n4. 坚持这一论断，要求把人民对美好生活的向往作为奋斗目标，坚持发展为了人民、发展依靠人民、发展成果由人民共享。\n5. 它也要求尊重人民主体地位，走群众路线，接受人民监督，维护最广大人民根本利益。", "keywords": ["物质财富", "精神财富", "社会变革", "决定力量", "人民主体地位"]}, {"no": "S5", "chapter": "第三章", "section": "思考题", "question": "习近平指出：“我们既要绿水青山，也要金山银山。宁要绿水青山，不要金山银山，而且绿水青山就是金山银山。”请结合自然地理环境在社会生存和发展中的作用，谈谈应怎样认识和处理经济发展与环境保护的关系。", "answer": "1. 自然地理环境是社会存在和发展的必要条件，为人类提供生产生活资料和生态空间。\n2. 自然环境不能决定社会制度性质，但会影响生产方式、生活质量和可持续发展。\n3. 经济发展不能以破坏生态环境为代价，生态环境本身也是重要生产力和民生福祉。\n4. “绿水青山就是金山银山”说明生态保护和经济发展可以在科学发展方式中实现统一。\n5. 正确处理二者关系，要坚持绿色发展、节约资源、保护环境，推动产业转型，实现人与自然和谐共生。", "keywords": ["社会存在", "生产方式", "生产力"]}, {"no": "S1", "chapter": "第四章", "section": "思考题", "question": "为什么说“资本来到世间，从头到脚，每个毛孔都滴着血和肮脏的东西”？", "answer": "1. 这句话揭示资本原始积累的暴力和掠夺性质。资本主义不是在平等自愿中自然产生的，而是在剥夺劳动者生产资料中形成的。\n2. 原始积累通过圈地运动、殖民掠夺、奴隶贸易、暴力征服和国家权力等手段，把生产资料集中到少数人手中。\n3. 劳动者被迫失去生产资料，成为只能出卖劳动力的雇佣工人。\n4. 资本原始积累一方面为资本主义生产方式准备了货币财富和自由劳动力，另一方面充满血腥和非正义。\n5. 这一论断揭露了资本主义制度形成背后的剥削关系和暴力基础。", "keywords": ["原始积累", "生产资料", "圈地运动", "殖民掠夺", "生产方式", "剥削关系"]}, {"no": "S2", "chapter": "第四章", "section": "思考题", "question": "马克思说：“最初一看，商品好像是一种简单而平凡的东西。对商品的分析表明，它却是一种很古怪的东西，充满形而上学的微妙和神学的怪诞。”如何理解这一论述？如何把握商品背后隐藏的人与人之间的经济关系？", "answer": "1. 商品表面上只是有用物，似乎简单平凡，但它同时具有使用价值和价值，包含具体劳动和抽象劳动的矛盾。\n2. 在商品交换中，人与人之间的社会劳动关系表现为物与物之间的关系，好像商品本身天然具有价值和支配力量。\n3. 这种现象就是商品拜物教：商品关系掩盖了背后生产者之间的社会关系。\n4. 商品价值不是物的自然属性，而是凝结在商品中的无差别的人类劳动。\n5. 把握商品背后的经济关系，就要透过交换和价格现象，看到社会分工、私人劳动与社会劳动的矛盾以及人与人之间的生产关系。", "keywords": ["使用价值", "具体劳动", "抽象劳动", "社会劳动", "商品拜物教", "社会分工", "私人劳动", "生产关系"]}, {"no": "S3", "chapter": "第四章", "section": "思考题", "question": "如何理解“资本是带来剩余价值的价值”？", "answer": "1. 资本不是一般的货币或物，而是在特定社会关系中能够增殖的价值。\n2. 货币只有用于购买劳动力和生产资料，并在生产过程中占有剩余价值时，才转化为资本。\n3. 剩余价值来源于雇佣工人的剩余劳动，不是来自流通、机器或资本自身。\n4. “带来剩余价值的价值”揭示资本的运动目的就是价值增殖，即用价值获得更多价值。\n5. 因而资本的本质是资本家剥削雇佣劳动的社会生产关系。", "keywords": ["生产资料", "来源", "剩余劳动", "目的", "雇佣劳动", "生产关系"]}, {"no": "S4", "chapter": "第四章", "section": "思考题", "question": "运用历史和现实的事实说明经济危机是资本主义基本矛盾的集中体现。", "answer": "1. 资本主义基本矛盾是生产社会化和生产资料资本主义私人占有之间的矛盾。\n2. 经济危机通常表现为生产过剩、商品积压、企业倒闭、失业增加、金融动荡和社会生活混乱。\n3. 生产过剩不是绝对过剩，而是相对于劳动人民有支付能力的需求不足而言的相对过剩。\n4. 历史上的周期性经济危机和现实中的金融危机、债务危机，都说明资本主义市场自发调节无法根除这一矛盾。\n5. 危机集中暴露了个别企业生产有组织性和整个社会生产无政府状态之间的冲突，也暴露了资本追逐利润同人民需要之间的冲突。", "keywords": ["生产社会化", "生产资料", "私人占有", "商品", "有支付能力的需求", "有组织性", "无政府状态"]}, {"no": "S5", "chapter": "第四章", "section": "思考题", "question": "有人认为，资本主义民主是囿于“钱主”的民主，迷于“游戏”的民主，止于“选举”的民主。如何看待这种说法，为什么？", "answer": "1. 这种说法揭示了资本主义民主的阶级局限。资本主义民主建立在资本主义私有制基础上，受资本力量深刻制约。\n2. “钱主”的民主说明金钱、财团、媒体和利益集团能够影响选举、政策和公共舆论，使形式平等掩盖事实不平等。\n3. “游戏”的民主说明党派竞争和政治表演可能脱离人民实际利益，变成争夺权力的制度游戏。\n4. “止于选举”的民主说明资本主义民主往往把民主简化为周期性投票，而普通群众在日常治理和重大决策中的实质参与有限。\n5. 评价民主不能只看程序形式，还要看人民是否真正当家作主，是否能有效维护最广大人民的根本利益。", "keywords": ["钱主", "掩盖", "止于选举"]}, {"no": "S1", "chapter": "第五章", "section": "思考题", "question": "垄断是怎样产生的？为什么说垄断并没有消除竞争？", "answer": "1. 垄断产生于自由竞争。自由竞争推动生产集中和资本集中，当集中发展到一定程度，就形成少数大企业控制生产和市场的垄断。\n2. 垄断组织通过协议、联合、控股等方式操纵生产、销售、价格和市场，以获取高额垄断利润。\n3. 垄断没有消除竞争，因为商品经济、资本主义私有制和资本逐利本性仍然存在。\n4. 垄断组织之间、垄断组织内部、垄断资本与非垄断资本之间，以及不同国家垄断资本之间仍存在竞争。\n5. 垄断条件下竞争范围更广、手段更多、破坏性更强，表现为垄断与竞争并存。", "keywords": ["自由竞争", "高额垄断利润", "商品"]}, {"no": "S2", "chapter": "第五章", "section": "思考题", "question": "为什么说国家垄断资本主义体现了资本主义生产关系的部分质变？", "answer": "1. 国家垄断资本主义是私人垄断资本同资产阶级国家政权相结合的垄断资本主义。\n2. 它通过国家调节、国有资本、财政金融政策、社会保障和产业政策等方式干预经济运行。\n3. 这种形式突破了单个私人资本直接支配的局限，表现出资本主义生产关系在调节方式和组织形式上的部分变化。\n4. 但这种变化没有改变资本主义私有制和雇佣劳动剥削关系，没有改变资产阶级国家维护资本利益的本质。\n5. 因此，它是资本主义生产关系的部分质变，而不是资本主义制度根本性质的改变。", "keywords": ["调节", "雇佣劳动", "剥削关系", "本质"]}, {"no": "S3", "chapter": "第五章", "section": "思考题", "question": "如何认识和把握经济全球化及其影响？", "answer": "1. 经济全球化是生产、贸易、金融、投资和企业经营在全球范围内日益联系和相互依存的过程。\n2. 它是社会生产力发展、科技进步、国际分工深化和资本扩张共同作用的结果。\n3. 积极影响在于促进资源全球配置、技术传播、贸易扩大和经济增长，为发展中国家提供一定发展机遇。\n4. 消极影响在于加剧不平等和依附关系，扩大金融风险、产业风险和生态风险，使发展中国家面临更大外部冲击。\n5. 对经济全球化要辩证认识，既积极参与，又维护国家经济安全；既扩大开放，又增强自主创新和规则塑造能力。", "keywords": ["联系", "相互依存", "生产力", "深化", "经济安全"]}, {"no": "S4", "chapter": "第五章", "section": "思考题", "question": "近年来资本主义社会发生了哪些新变化？试分析其原因及影响。", "answer": "1. 新变化包括生产资料所有制形式更复杂、劳资关系有所调整、社会福利制度发展、国家干预增强、产业结构和阶级结构变化、科技和金融资本作用上升等。\n2. 原因包括生产力和科技革命推动，工人阶级斗争压力，社会主义制度影响，资本主义自我调节需要，以及全球竞争加剧。\n3. 这些变化在一定程度上缓和了矛盾，提高了资本主义社会的适应能力和延续能力。\n4. 但它们没有改变资本主义私有制、雇佣劳动剥削和资本追逐剩余价值的本质。\n5. 因而，新变化不能说明资本主义基本矛盾消失，只说明资本主义在矛盾中调整和发展。", "keywords": ["生产资料", "金融资本", "生产力", "调节", "雇佣劳动", "剩余价值", "基本矛盾"]}, {"no": "S5", "chapter": "第五章", "section": "思考题", "question": "如何理解资本主义的历史地位及其为社会主义所代替的历史必然性？", "answer": "1. 资本主义曾在历史上起过进步作用，极大推动生产力发展、世界市场形成、科学技术进步和社会关系变革。\n2. 资本主义也创造了高度社会化的大生产，为更高级社会形态准备了物质条件。\n3. 资本主义的局限在于生产社会化同生产资料私人占有之间的基本矛盾，导致剥削、危机、两极分化和人的片面发展。\n4. 社会主义代替资本主义，是生产关系一定要适合生产力状况这一社会发展规律作用的结果。\n5. 这一过程具有历史必然性，但不会自动实现，而是长期、复杂、曲折的历史过程。", "keywords": ["物质条件", "生产社会化", "生产资料", "私人占有", "基本矛盾", "两极分化", "适合生产力状况", "社会发展规律"]}, {"no": "S1", "chapter": "第六章", "section": "思考题", "question": "世界社会主义五百年，是风雨苍黄、沧海桑田的五百年，是栉风沐雨、探索前行的五百年。社会主义思想传承与演变是一个不断本土化、时代化的过程，请谈谈世界社会主义五百年历史发展演变的启示。", "answer": "1. 世界社会主义经历了从空想到科学、从理论到实践、从一国实践到多国发展、从曲折挫折到新的探索的历史过程。\n2. 这一历程说明，社会主义是人类对更公平更合理社会制度的长期追求，具有深厚历史根基。\n3. 科学社会主义必须同各国具体实际相结合，不能照搬固定模式。\n4. 社会主义发展不是一帆风顺的，挫折并不等于失败，关键在于总结经验、坚持真理、修正错误。\n5. 中国特色社会主义的成功表明，科学社会主义在21世纪仍具有强大生命力。", "keywords": ["曲折", "科学社会主义", "具体实际", "中国特色社会主义"]}, {"no": "S2", "chapter": "第六章", "section": "思考题", "question": "恩格斯指出：“原则不是研究的出发点，而是它的最终结果；这些原则不是被应用于自然界和人类历史，而是从它们中抽象出来的；不是自然界和人类去适应原则，而是原则只有在符合自然界和历史的情况下才是正确的。”请联系实际，谈谈对科学社会主义基本原则是符合人类社会发展规律的正确理论原则的理解。", "answer": "1. 科学社会主义基本原则不是主观设想，而是从资本主义矛盾运动和人类社会发展规律中概括出来的科学结论。\n2. 它以唯物史观和剩余价值学说为基础，揭示资本主义必然灭亡、社会主义必然胜利的历史趋势。\n3. 科学社会主义原则只有同具体历史条件相结合，才能成为有效指导实践的理论。\n4. 判断原则是否正确，要看它是否符合社会发展规律，是否经得起实践检验，是否推动人的解放和社会进步。\n5. 联系实际，坚持科学社会主义基本原则，就要坚持党的领导、人民主体地位、社会主义制度方向和共同富裕目标，同时根据时代条件不断丰富实现形式。", "keywords": ["唯物史观", "剩余价值学说", "人民主体地位", "共同富裕"]}, {"no": "S3", "chapter": "第六章", "section": "思考题", "question": "习近平指出：“当代中国的伟大社会变革，不是简单延续我国历史文化的母版，不是简单套用马克思主义经典作家设想的模板，不是其他国家社会主义实践的再版，也不是国外现代化发展的翻版。”请结合这一重要论述谈谈中国特色社会主义对科学社会主义基本原则的发展。", "answer": "1. 中国特色社会主义坚持科学社会主义基本原则，如党的领导、人民主体、公有制主体地位、共同富裕方向和人的全面发展目标。\n2. 它又立足中国具体实际和时代条件，走出不同于苏联模式、西方模式和传统现代化模式的发展道路。\n3. 中国特色社会主义把科学社会主义基本原则同中国历史文化、现实国情和改革开放实践结合起来，实现了理论创新和实践创新。\n4. 它创造性回答了在经济文化相对落后的东方大国如何建设、巩固和发展社会主义的问题。\n5. 因而，中国特色社会主义不是对经典设想的照搬，而是科学社会主义在当代中国的新发展。", "keywords": ["共同富裕", "中国具体实际", "改革", "理论创新", "实践创新"]}, {"no": "S4", "chapter": "第六章", "section": "思考题", "question": "科学社会主义在21世纪的中国焕发出新的蓬勃生机，如何认识新时代十年的伟大变革在社会主义发展史上的里程碑意义？", "answer": "1. 新时代十年的伟大变革推动党和国家事业取得历史性成就、发生历史性变革，彰显中国特色社会主义制度优势。\n2. 它推进全面从严治党、脱贫攻坚、全面建成小康社会、科技创新、生态文明、国家治理、国防外交等多方面发展。\n3. 这些成就证明科学社会主义在中国不是抽象理论，而是能够解决重大现实问题、推动国家发展的制度和实践力量。\n4. 新时代伟大变革拓展了发展中国家走向现代化的路径，打破了“现代化等于西方化”的迷思。\n5. 它使科学社会主义在21世纪中国焕发新的生命力，在世界社会主义发展史上具有重要里程碑意义。", "keywords": ["中国特色社会主义", "科学社会主义", "现代化等于西方化"]}, {"no": "S5", "chapter": "第六章", "section": "思考题", "question": "经过不懈努力，中国共产党找到了自我革命这一跳出治乱兴衰历史周期率的第二个答案。请结合共产党的执政规律，谈谈对执政党自我革命的理解。", "answer": "1. 执政党长期执政面临权力腐蚀、脱离群众、利益固化和能力不足等风险，必须不断自我净化、自我完善、自我革新、自我提高。\n2. 自我革命是中国共产党区别于其他政党的显著标志，体现党没有任何自己特殊利益，始终代表最广大人民根本利益。\n3. 自我革命要求全面从严治党，严明纪律，反腐败，完善监督体系，保持党的先进性和纯洁性。\n4. 它是跳出历史周期率的重要途径，使党能够及时发现和解决自身问题，保持长期执政能力。\n5. 自我革命必须同人民监督结合起来，确保党始终同人民想在一起、干在一起。", "keywords": ["自我完善", "自我革命"]}, {"no": "S6", "chapter": "第六章", "section": "思考题", "question": "习近平在追溯我国现代化历史时指出：“从第一个五年计划到第十四个五年规划，一以贯之的主题是把我国建设成为社会主义现代化国家。”中国式现代化是独具特色的社会主义现代化，它的成功实践有哪些世界意义？", "answer": "1. 中国式现代化打破了现代化等于西方化的单一路径，证明发展中国家可以根据自身国情走向现代化。\n2. 它以人口规模巨大、共同富裕、物质文明和精神文明协调、人与自然和谐共生、和平发展为重要特征，丰富了现代化内涵。\n3. 它为世界社会主义发展注入新活力，展示社会主义制度在现代化进程中的强大生命力。\n4. 它为广大发展中国家独立自主探索发展道路提供了重要借鉴。\n5. 它推动构建人类命运共同体，为解决全球发展、治理、生态、安全等问题贡献中国智慧和中国方案。", "keywords": ["共同富裕", "独立自主", "人类命运共同体"]}, {"no": "S1", "chapter": "第七章", "section": "思考题", "question": "请谈谈在未来理想社会的认识上，马克思主义经典作家与空想社会主义者有何本质区别。", "answer": "1. 空想社会主义者对未来社会有许多美好设想，但主要从道义批判和理性设计出发，缺乏科学的历史根据。\n2. 马克思主义经典作家立足唯物史观和剩余价值学说，从资本主义基本矛盾和社会发展规律中说明未来社会的历史必然性。\n3. 空想社会主义者找不到实现理想社会的现实力量；马克思主义指出无产阶级和人民群众是实现社会变革的主体力量。\n4. 空想社会主义往往描绘具体细节，容易脱离现实条件；马克思主义只揭示未来社会的一般特征和发展方向，反对凭空设计蓝图。\n5. 本质区别在于：一个是空想的理想设计，一个是建立在社会规律和现实运动基础上的科学理论。", "keywords": ["唯物史观", "剩余价值学说", "基本矛盾", "社会发展规律", "历史必然性", "现实力量"]}, {"no": "S2", "chapter": "第七章", "section": "思考题", "question": "既然共产主义理想的实现是历史的必然，为什么又要人们去努力追求？既然共产主义的最终实现是一个漫长的过程，为什么又说“共产主义渺茫论”是错误的？请用马克思主义的辩证观点予以解答。", "answer": "1. 历史必然性不是自动实现的宿命论，而是通过人民群众实践活动实现的客观趋势。\n2. 共产主义的实现需要生产力高度发展、社会关系深刻变革和人的全面发展，这些条件必须靠一代又一代人的努力创造。\n3. 共产主义实现是长期过程，说明道路艰巨复杂，不能急躁冒进 let chapter=DATA.chapters[0], section="全部";
const nav=document.getElementById("nav"), content=document.getElementById("content"), ct=document.getElementById("ct");
function esc(s){return String(s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]))}
function mark(text,kws){
  let s=esc(text), used=[];
  [...kws].filter(Boolean).sort((a,b)=>b.length-a.length).forEach(k=>{
    if(used.some(u=>u.includes(k)||k.includes(u))) return;
    const e=esc(k);
    const i=s.indexOf(e);
    if(i<0) return;
    used.push(k);
    s=s.slice(0,i)+`<button class="kw" type="button" aria-label="显示关键词"><span>${e}</span></button>`+s.slice(i+e.length);
  });
  return s
}
function drawNav(){nav.innerHTML=DATA.chapters.map((c,i)=>`<button class="${c===chapter?'active':''}" data-c="${c}"><span class="idx">${i}</span><span>${c}</span></button>`).join(""); nav.querySelectorAll("button").forEach(b=>b.onclick=()=>{chapter=b.dataset.c; render()})}
function render(){drawNav(); ct.textContent=chapter; let arr=DATA.items.filter(x=>x.chapter===chapter&&(section==="全部"||x.section===section)); let groups=[...new Set(arr.map(x=>x.section))]; content.innerHTML=groups.map(g=>`<div class="section-title">${g}</div>`+arr.filter(x=>x.section===g).map(x=>`<article class="card"><div class="q"><span class="num">${x.no}</span>${esc(x.question)}</div><div class="ans">${mark(x.answer,x.keywords)}</div></article>`).join("")).join(""); }
document.getElementById("mem").onclick=()=>document.body.classList.toggle("mem");
content.addEventListener("click",e=>{const k=e.target.closest(".kw"); if(k) k.classList.toggle("open")});
document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>{section=b.dataset.section; document.querySelectorAll(".tabs button").forEach(x=>x.classList.toggle("active",x===b)); render()});
render();
</script>
</body></html>
